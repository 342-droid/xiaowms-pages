<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 系统枚举</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* 页面特定样式 */
        .modal-form-group label {
            width: 110px;
        }

        .enum-code-link {
            color: #1677ff;
            text-decoration: none;
            cursor: pointer;
        }

        .enum-code-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">系统枚举</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">系统管理 / 系统枚举</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group">
                        <label>枚举编码:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>枚举名称:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>枚举编码</th>
                                <th>枚举名称</th>
                                <th>备注</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>ENUM001</td>
                                <td>性别</td>
                                <td>人员性别枚举</td>
                                <td>2025-01-05 12:31:43</td>
                                <td>管理员</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>ENUM002</td>
                                <td>订单状态</td>
                                <td>订单状态枚举</td>
                                <td>2025-01-05 12:31:43</td>
                                <td>管理员</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 系统枚举明细模态框 -->
    <div id="detailModal" class="modal" style="display: none; align-items: flex-start; padding-top: 7%; z-index: 3001;">
        <div class="modal-content" style="width: 620px; max-height: 88vh; min-height: 400px; margin: 0 auto; display: flex; flex-direction: column;">
            <div class="modal-header" style="margin-bottom: 15px;">
                <h2 class="modal-title">系统枚举明细-详情</h2>
                <span class="close" id="detailCloseBtn">&times;</span>
            </div>
            <form class="modal-form" style="display: flex; flex-direction: column; flex-wrap: nowrap; align-content: flex-start; justify-content: flex-start; gap: 15px; flex: 1;">
                <div class="modal-form-group" style="width: 100%;">
                    <label>枚举值编码 <span style="color: red;">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="detailCode" placeholder="请输入">
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group" style="width: 100%;">
                    <label>枚举值名称 <span style="color: red;">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="detailName" placeholder="请输入">
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group" style="width: 100%;">
                    <label>排序 <span style="color: red;">*</span></label>
                    <div class="input-wrapper">
                        <input type="number" id="detailSort" placeholder="请输入">
                        <span class="clear-btn">×</span>
                    </div>
                </div>
            </form>
            <div class="modal-footer" style="margin-top: auto; padding-top: 15px;">
                <button type="button" class="btn btn-secondary" id="detailCancelBtn">取消</button>
                <button type="button" class="btn btn-primary" id="detailSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 引入公共脚本 -->
    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        // 使用PageManager简化页面逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '系统枚举',
                
                fields: [
                    { id: 'enumCode', label: '枚举编码', type: 'text', required: true, editDisabled: false },
                    { id: 'enumName', label: '枚举名称', type: 'text', required: true, editDisabled: false },
                    { id: 'remark', label: '备注', type: 'textarea', labelWidth: '110px' },
                    { 
                        type: 'raw', 
                        editHtml: `
                            <div class="modal-form-group" style="width: 100%; flex-direction: column; align-items: flex-start; gap: 10px;">
                                <div style="display: flex; justify-content: flex-end; align-items: center; width: 100%;">
                                    <div style="display: flex; gap: 10px;">
                                        <button type="button" class="btn btn-primary" id="editAddDetailBtn">添加明细</button>
                                        <button type="button" class="btn btn-primary" id="editSaveEnumBtn">保存</button>
                                        <button type="button" class="btn btn-secondary" id="editCancelEnumBtn">取消</button>
                                    </div>
                                </div>
                                <div class="table-scroll-container" style="width: 100%; max-height: 200px; overflow-y: auto;">
                                    <table class="table" id="editDetailTable">
                                        <thead>
                                            <tr>
                                                <th>枚举值编码</th>
                                                <th>枚举值名称</th>
                                                <th>排序</th>
                                                <th>更新时间</th>
                                                <th>更新人</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody id="editDetailTableBody">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <style>
                                #editEnumModal .modal-footer {
                                    display: none !important;
                                }
                                .modal-form input:disabled,
                                .modal-form textarea:disabled {
                                    background-color: #f5f5f5;
                                    color: #999;
                                    cursor: not-allowed;
                                }
                                .modal-form button:disabled {
                                    background-color: #f5f5f5;
                                    color: #999;
                                    border: 1px solid #d9d9d9;
                                    cursor: not-allowed;
                                }
                            </style>
                        `
                    }
                ],
                
                editModal: {
                    modalId: 'editEnumModal',
                    title: '系统枚举-详情',
                    saveBtnId: 'editSaveEnumBtn',
                    cancelBtnId: 'editCancelEnumBtn',
                    validations: [
                        { id: 'editEnumCode', message: '请输入枚举编码', required: true },
                        { id: 'editEnumName', message: '请输入枚举名称', required: true }
                    ],
                    onSave: () => {
                        if (page.currentEditRow) {
                            // 更新现有行
                            page.updateTableRow(page.currentEditRow, {
                                1: document.getElementById('editEnumCode').value.trim(),
                                2: document.getElementById('editEnumName').value.trim(),
                                3: document.getElementById('editRemark').value.trim() || '-',
                                4: page.getCurrentTimeStr(),
                                5: '当前用户'
                            });
                            showToast('系统枚举信息已更新', 'success');
                            page.currentEditRow = null;
                        } else {
                            // 新增行
                            const code = document.getElementById('editEnumCode').value.trim();
                            const name = document.getElementById('editEnumName').value.trim();
                            const remark = document.getElementById('editRemark').value.trim() || '-';
                            
                            page.addTableRow({
                                cells: [
                                    code,
                                    name,
                                    remark,
                                    page.getCurrentTimeStr(),
                                    '当前用户'
                                ]
                            });
                            showToast('系统枚举信息已保存', 'success');
                        }
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        
                        // 填充明细表格默认值
                        const editDetailTableBody = document.getElementById('editDetailTableBody');
                        if (editDetailTableBody) {
                            // 清空现有内容
                            editDetailTableBody.innerHTML = '';
                            
                            // 添加默认明细数据
                            let defaultDetails = [];
                            if (cells[1].textContent === 'ENUM001') {
                                defaultDetails = [
                                    { code: 'M', name: '男', sort: 1 },
                                    { code: 'F', name: '女', sort: 2 }
                                ];
                            } else if (cells[1].textContent === 'ENUM002') {
                                defaultDetails = [
                                    { code: 'PENDING', name: '待处理', sort: 1 },
                                    { code: 'PROCESSING', name: '处理中', sort: 2 },
                                    { code: 'COMPLETED', name: '已完成', sort: 3 },
                                    { code: 'CANCELLED', name: '已取消', sort: 4 }
                                ];
                            }
                            
                            const now = new Date();
                            const timeStr = now.getFullYear() + '-' + 
                                String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                                String(now.getDate()).padStart(2, '0') + ' ' +
                                String(now.getHours()).padStart(2, '0') + ':' +
                                String(now.getMinutes()).padStart(2, '0') + ':' +
                                String(now.getSeconds()).padStart(2, '0');
                            
                            defaultDetails.forEach(detail => {
                                const newRow = `
                                    <tr>
                                        <td>${detail.code}</td>
                                        <td>${detail.name}</td>
                                        <td>${detail.sort}</td>
                                        <td>${timeStr}</td>
                                        <td>当前用户</td>
                                        <td class="action-links">
                                            <a href="#" class="detail-edit-btn">编辑</a>
                                            <a href="#" class="detail-delete-btn delete-btn">删除</a>
                                        </td>
                                    </tr>
                                `;
                                editDetailTableBody.insertAdjacentHTML('beforeend', newRow);
                            });
                        }
                        
                        // 延迟执行，确保模态框已完全打开
                        setTimeout(() => {
                            // 启用所有输入字段
                            const modal = document.getElementById('editEnumModal');
                            if (modal) {
                                // 启用输入框和文本域
                                modal.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(input => {
                                    input.disabled = false;
                                });
                                
                                // 启用按钮
                                document.getElementById('editAddDetailBtn').disabled = false;
                                document.getElementById('editSaveEnumBtn').disabled = false;
                                
                                // 显示明细表格中的操作按钮
                                modal.querySelectorAll('.detail-edit-btn, .detail-delete-btn').forEach(btn => {
                                    btn.style.display = '';
                                });
                            }
                        }, 100);
                        
                        return {
                            editEnumCode: cells[1].textContent,
                            editEnumName: cells[2].textContent,
                            editRemark: cells[3].textContent === '-' ? '' : cells[3].textContent
                        };
                    }
                },
                
                deleteModal: {},
                
                onView: (element) => {
                    const row = element.closest('tr');
                    const cells = row.querySelectorAll('td');
                    
                    // 填充明细表格默认值
                    const editDetailTableBody = document.getElementById('editDetailTableBody');
                    if (editDetailTableBody) {
                        // 清空现有内容
                        editDetailTableBody.innerHTML = '';
                        
                        // 添加默认明细数据
                        let defaultDetails = [];
                        if (cells[1].textContent === 'ENUM001') {
                            defaultDetails = [
                                { code: 'M', name: '男', sort: 1 },
                                { code: 'F', name: '女', sort: 2 }
                            ];
                        } else if (cells[1].textContent === 'ENUM002') {
                            defaultDetails = [
                                { code: 'PENDING', name: '待处理', sort: 1 },
                                { code: 'PROCESSING', name: '处理中', sort: 2 },
                                { code: 'COMPLETED', name: '已完成', sort: 3 },
                                { code: 'CANCELLED', name: '已取消', sort: 4 }
                            ];
                        }
                        
                        const now = new Date();
                        const timeStr = now.getFullYear() + '-' + 
                            String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                            String(now.getDate()).padStart(2, '0') + ' ' +
                            String(now.getHours()).padStart(2, '0') + ':' +
                            String(now.getMinutes()).padStart(2, '0') + ':' +
                            String(now.getSeconds()).padStart(2, '0');
                        
                        defaultDetails.forEach(detail => {
                            const newRow = `
                                <tr>
                                    <td>${detail.code}</td>
                                    <td>${detail.name}</td>
                                    <td>${detail.sort}</td>
                                    <td>${timeStr}</td>
                                    <td>当前用户</td>
                                    <td class="action-links">
                                        <a href="#" class="detail-edit-btn" style="color: #999; cursor: not-allowed; pointer-events: none;">编辑</a>
                                        <a href="#" class="detail-delete-btn delete-btn" style="color: #999; cursor: not-allowed; pointer-events: none;">删除</a>
                                    </td>
                                </tr>
                            `;
                            editDetailTableBody.insertAdjacentHTML('beforeend', newRow);
                        });
                    }
                    
                    // 打开模态框
                    page.openModal('edit', { 
                        data: {
                            editEnumCode: cells[1].textContent,
                            editEnumName: cells[2].textContent,
                            editRemark: cells[3].textContent === '-' ? '' : cells[3].textContent
                        },
                        reset: false
                    });
                    
                    // 延迟执行，确保模态框已完全打开
                    setTimeout(() => {
                        // 禁用所有输入字段
                        const modal = document.getElementById('editEnumModal');
                        if (modal) {
                            // 禁用输入框和文本域
                            modal.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(input => {
                                input.disabled = true;
                            });
                            
                            // 禁用按钮
                            document.getElementById('editAddDetailBtn').disabled = true;
                            document.getElementById('editSaveEnumBtn').disabled = true;
                            
                            // 禁用明细表格中的操作按钮
                            modal.querySelectorAll('.detail-edit-btn, .detail-delete-btn').forEach(btn => {
                                btn.style.color = '#999';
                                btn.style.cursor = 'not-allowed';
                                btn.style.pointerEvents = 'none';
                            });
                        }
                    }, 100);
                }
            });
            
            page.init();

            // 明细模态框逻辑
            const detailSaveBtn = document.getElementById('detailSaveBtn');
            const detailModalTitle = document.querySelector('#detailModal .modal-title');
            let detailModalController;
            
            // 确保WMSUI对象已定义
            if (window.WMSUI) {
                detailModalController = window.WMSUI.createModalController({
                    modalId: 'detailModal',
                    closeButtonIds: ['detailCloseBtn', 'detailCancelBtn']
                });
            } else {
                // 如果WMSUI未定义，创建一个简单的模态框控制器
                detailModalController = {
                    open: function() {
                        document.getElementById('detailModal').style.display = 'block';
                    },
                    close: function() {
                        document.getElementById('detailModal').style.display = 'none';
                    }
                };
                
                // 绑定关闭按钮事件
                document.getElementById('detailCloseBtn').addEventListener('click', detailModalController.close);
                document.getElementById('detailCancelBtn').addEventListener('click', detailModalController.close);
                
                // 点击遮罩关闭
                document.getElementById('detailModal').addEventListener('click', function(e) {
                    if (e.target === this) {
                        detailModalController.close();
                    }
                });
            }
            
            let currentDetailTarget = null; // 'add' | 'edit'
            let currentEditingDetailRow = null;
            
            // 打开明细模态框
            function openDetailModal(target, row = null) {
                currentDetailTarget = target;
                currentEditingDetailRow = row;
                detailModalController.open();
                const codeInput = document.getElementById('detailCode');
                const nameInput = document.getElementById('detailName');
                const sortInput = document.getElementById('detailSort');
                if (!codeInput || !nameInput || !sortInput) return;

                // 清空表单
                codeInput.value = '';
                nameInput.value = '';
                sortInput.value = '';

                if (target === 'edit' && row) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 3) {
                        codeInput.value = cells[0].textContent.trim();
                        nameInput.value = cells[1].textContent.trim();
                        sortInput.value = cells[2].textContent.trim();
                    }
                    if (detailModalTitle) detailModalTitle.textContent = '系统枚举明细-详情';
                    if (detailSaveBtn) detailSaveBtn.textContent = '保存';
                } else {
                    if (detailModalTitle) detailModalTitle.textContent = '系统枚举明细-详情';
                    if (detailSaveBtn) detailSaveBtn.textContent = '保存';
                }
            }
            
            // 关闭明细模态框
            function closeDetailModal() {
                detailModalController.close();
                currentDetailTarget = null;
                currentEditingDetailRow = null;
            }
            
            // 新增按钮点击事件
            const addBtn = document.getElementById('addBtn');
            if (addBtn) {
                addBtn.addEventListener('click', () => {
                    page.currentEditRow = null;
                    // 清空明细表格
                    const editDetailTableBody = document.getElementById('editDetailTableBody');
                    if (editDetailTableBody) {
                        editDetailTableBody.innerHTML = '';
                    }
                    page.openModal('edit', { 
                        reset: true
                    });
                    
                    // 延迟执行，确保模态框已完全打开
                    setTimeout(() => {
                        // 启用所有输入字段
                        const modal = document.getElementById('editEnumModal');
                        if (modal) {
                            // 启用输入框和文本域
                            modal.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(input => {
                                input.disabled = false;
                            });
                            
                            // 启用按钮
                            document.getElementById('editAddDetailBtn').disabled = false;
                            document.getElementById('editSaveEnumBtn').disabled = false;
                            
                            // 启用明细表格中的操作按钮
                            modal.querySelectorAll('.detail-edit-btn, .detail-delete-btn').forEach(btn => {
                                btn.style.color = '';
                                btn.style.cursor = '';
                                btn.style.pointerEvents = '';
                            });
                        }
                    }, 100);
                });
            }
            
            // 明细模态框事件绑定（使用事件委托，因为按钮是动态生成的）
            document.addEventListener('click', (e) => {
                if (e.target.id === 'editAddDetailBtn') {
                    e.preventDefault();
                    openDetailModal('add');
                }
                if (e.target.classList.contains('detail-edit-btn')) {
                    e.preventDefault();
                    openDetailModal('edit', e.target.closest('tr'));
                }
                if (e.target.classList.contains('edit-btn')) {
                    e.preventDefault();
                    // 延迟执行，确保模态框已完全打开
                    setTimeout(() => {
                        // 启用所有输入字段
                        const modal = document.getElementById('editEnumModal');
                        if (modal) {
                            // 启用输入框和文本域
                            modal.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(input => {
                                input.disabled = false;
                            });
                            
                            // 启用按钮
                            document.getElementById('editAddDetailBtn').disabled = false;
                            document.getElementById('editSaveEnumBtn').disabled = false;
                            
                            // 启用明细表格中的操作按钮
                            modal.querySelectorAll('.detail-edit-btn, .detail-delete-btn').forEach(btn => {
                                btn.style.color = '';
                                btn.style.cursor = '';
                                btn.style.pointerEvents = '';
                            });
                        }
                    }, 100);
                }
            });
            
            // 保存明细
            if (detailSaveBtn) {
                detailSaveBtn.addEventListener('click', () => {
                    const codeInput = document.getElementById('detailCode');
                    const nameInput = document.getElementById('detailName');
                    const sortInput = document.getElementById('detailSort');
                    if (!codeInput || !nameInput || !sortInput) return;
                    
                    const code = codeInput.value.trim();
                    const name = nameInput.value.trim();
                    const sort = sortInput.value.trim();
                    
                    if (!code) {
                        showToast('请输入枚举值编码', 'error');
                        return;
                    }
                    if (!name) {
                        showToast('请输入枚举值名称', 'error');
                        return;
                    }
                    if (!sort) {
                        showToast('请输入排序', 'error');
                        return;
                    }
                    
                    // 检查重复数据
                    const existingRows = document.querySelectorAll('#editDetailTableBody tr');
                    const existingCodes = [];
                    existingRows.forEach(row => {
                        if (currentDetailTarget === 'edit' && row === currentEditingDetailRow) return;
                        const cells = row.querySelectorAll('td');
                        if (cells.length >= 1) {
                            existingCodes.push(cells[0].textContent);
                        }
                    });
                    
                    // 检查是否有重复编码
                    if (existingCodes.includes(code)) {
                        showToast('枚举值编码已存在，请检查！', 'error');
                        return;
                    }
                    
                    const now = new Date();
                    const timeStr = now.getFullYear() + '-' + 
                        String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(now.getDate()).padStart(2, '0') + ' ' +
                        String(now.getHours()).padStart(2, '0') + ':' +
                        String(now.getMinutes()).padStart(2, '0') + ':' +
                        String(now.getSeconds()).padStart(2, '0');

                    if (currentDetailTarget === 'edit' && currentEditingDetailRow) {
                        const editCells = currentEditingDetailRow.querySelectorAll('td');
                        if (editCells.length >= 5) {
                            editCells[0].textContent = code;
                            editCells[1].textContent = name;
                            editCells[2].textContent = sort;
                            editCells[3].textContent = timeStr;
                            editCells[4].textContent = '当前用户';
                        }
                        showToast('明细已更新', 'success');
                        closeDetailModal();
                        return;
                    }
                    
                    const newRow = `
                        <tr>
                            <td>${code}</td>
                            <td>${name}</td>
                            <td>${sort}</td>
                            <td>${timeStr}</td>
                            <td>当前用户</td>
                            <td class="action-links">
                                <a href="#" class="detail-edit-btn">编辑</a>
                                <a href="#" class="detail-delete-btn delete-btn">删除</a>
                            </td>
                        </tr>
                    `;
                    const editDetailTableBody = document.getElementById('editDetailTableBody');
                    if (editDetailTableBody) {
                        editDetailTableBody.insertAdjacentHTML('beforeend', newRow);
                    }
                    
                    showToast('明细已添加', 'success');
                    closeDetailModal();
                });
            }
            
            // 明细删除事件委托
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('detail-delete-btn')) {
                    e.preventDefault();
                    const row = e.target.closest('tr');
                    if (row) {
                        row.remove();
                        showToast('明细已删除', 'success');
                    }
                }
            });
        });
    </script>
</body>
</html>
