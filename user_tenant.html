<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 用户-租户</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .modal-form-group label {
            width: 110px;
        }


        .custom-select.is-disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .custom-select.is-disabled input {
            background-color: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .custom-select.is-disabled .select-arrow,
        .custom-select.is-disabled .clear-btn {
            color: #bbb;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>

    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">用户-租户</button>
            </div>

            <hr class="content-divider">

            <div class="content-title">权限管理 / 用户-租户</div>

            <section class="search-section">
                <form class="search-form">
                    <div class="form-group">
                        <label>租户编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTenantCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>用户编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchUserCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="yes">启用</div>
                                <div class="select-option" data-value="no">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>用户编码</th>
                                <th>用户名称</th>
                                <th>租户编码</th>
                                <th>租户名称</th>
                                <th>备注</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>U001</td>
                                <td>张三</td>
                                <td>T001</td>
                                <td>华东租户</td>
                                <td>华东业务负责人</td>
                                <td><span class="status active">启用</span></td>
                                <td>2026-03-20 10:15:28</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>U002</td>
                                <td>李四</td>
                                <td>T002</td>
                                <td>华北租户</td>
                                <td>临时停用</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2026-03-18 16:42:09</td>
                                <td>王五</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userOptions = [
                { value: 'U001', text: 'U001-张三' },
                { value: 'U002', text: 'U002-李四' },
                { value: 'U003', text: 'U003-王五' },
                { value: 'U004', text: 'U004-赵六' }
            ];

            const tenantOptions = [
                { value: 'T001', text: 'T001-华东租户' },
                { value: 'T002', text: 'T002-华北租户' },
                { value: 'T003', text: 'T003-华南租户' }
            ];

            const page = new PageManager({
                entityName: '用户-租户',
                statusColumnIndex: 6,
                customSelects: [
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                fields: [
                    { id: 'userCode', label: '用户', type: 'select', required: true, options: userOptions, placeholder: '请选择' },
                    { id: 'tenant', label: '租户', type: 'select', required: true, options: tenantOptions, placeholder: '请选择' },
                    { id: 'remark', label: '备注', type: 'text' },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true, options: CommonOptions.isEnabled }
                ],
                addModal: {
                    modalId: 'addUserTenantModal',
                    saveBtnId: 'saveUserTenantBtn',
                    cancelBtnId: 'cancelUserTenantBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用' },
                    validations: [
                        { id: 'userCode', message: '请选择用户', required: true },
                        { id: 'tenant', message: '请选择租户', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const userInput = document.getElementById('userCode');
                        const userText = userInput ? userInput.value.trim() : '';
                        const userDataValue = userInput ? (userInput.dataset.value || '').trim() : '';
                        const matchedUser = userOptions.find(item => item.value === userDataValue || item.text === userText);
                        const userDisplay = matchedUser ? matchedUser.text : userText;
                        const userParts = userDisplay.split('-');
                        const userCode = userParts.shift() || '';
                        const userName = userParts.join('-');

                        if (!userCode || !userName) {
                            showToast('请选择有效的用户');
                            if (userInput) userInput.focus();
                            return;
                        }

                        const tenantInput = document.getElementById('tenant');
                        const tenantText = tenantInput ? tenantInput.value.trim() : '';
                        const tenantDataValue = tenantInput ? (tenantInput.dataset.value || '').trim() : '';
                        const matchedTenant = tenantOptions.find(item => item.value === tenantDataValue || item.text === tenantText);
                        const tenantDisplay = matchedTenant ? matchedTenant.text : tenantText;
                        const tenantParts = tenantDisplay.split('-');
                        const tenantCode = tenantParts.shift() || '';
                        const tenantName = tenantParts.join('-');

                        if (!tenantCode || !tenantName) {
                            showToast('请选择有效的租户');
                            if (tenantInput) tenantInput.focus();
                            return;
                        }

                        const remark = document.getElementById('remark').value.trim();
                        const enabled = document.getElementById('isEnabled').value.trim();

                        const newRow = page.addTableRow({
                            cells: [
                                userCode,
                                userName,
                                tenantCode,
                                tenantName,
                                remark,
                                { value: enabled, isStatus: true },
                                page.getCurrentTimeStr(),
                                '当前用户'
                            ]
                        });

                        if (newRow) {
                            const addRoleBtn = newRow.querySelector('.add-role-btn');
                            if (addRoleBtn) {
                                addRoleBtn.remove();
                            }
                        }
                        showToast('用户-租户信息已保存', 'success');
                    }
                },
                editModal: {
                    modalId: 'editUserTenantModal',
                    saveBtnId: 'editSaveUserTenantBtn',
                    cancelBtnId: 'editCancelUserTenantBtn',
                    validations: [
                        { id: 'editTenant', message: '请选择租户', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        
                        // 处理用户字段
                        const userInput = document.getElementById('editUserCode');
                        const userText = userInput ? userInput.value.trim() : '';
                        const userDataValue = userInput ? (userInput.dataset.value || '').trim() : '';
                        const matchedUser = userOptions.find(item => item.value === userDataValue || item.text === userText);
                        const userDisplay = matchedUser ? matchedUser.text : userText;
                        const userParts = userDisplay.split('-');
                        const userCode = userParts.shift() || '';
                        const userName = userParts.join('-');

                        if (!userCode || !userName) {
                            showToast('请选择有效的用户');
                            if (userInput) userInput.focus();
                            return;
                        }
                        
                        // 处理租户字段
                        const tenantInput = document.getElementById('editTenant');
                        const tenantText = tenantInput ? tenantInput.value.trim() : '';
                        const tenantDataValue = tenantInput ? (tenantInput.dataset.value || '').trim() : '';
                        const matchedTenant = tenantOptions.find(item => item.value === tenantDataValue || item.text === tenantText);
                        const tenantDisplay = matchedTenant ? matchedTenant.text : tenantText;
                        const tenantParts = tenantDisplay.split('-');
                        const tenantCode = tenantParts.shift() || '';
                        const tenantName = tenantParts.join('-');

                        if (!tenantCode || !tenantName) {
                            showToast('请选择有效的租户');
                            if (tenantInput) tenantInput.focus();
                            return;
                        }
                        
                        page.updateTableRow(page.currentEditRow, {
                            1: userCode,
                            2: userName,
                            3: tenantCode,
                            4: tenantName,
                            5: document.getElementById('editRemark').value.trim(),
                            6: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            7: page.getCurrentTimeStr(),
                            8: '当前用户'
                        });
                        showToast('用户-租户信息已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editUserCode: `${cells[1].textContent}-${cells[2].textContent}`,
                            editTenant: `${cells[3].textContent}-${cells[4].textContent}`,
                            editRemark: cells[5].textContent,
                            editIsEnabled: cells[6].querySelector('.status').textContent
                        };
                    }
                },
                deleteModal: {},
                
                onView: (element) => {
                    const row = element.closest('tr');
                    const cells = row.querySelectorAll('td');
                    
                    // 打开模态框
                    page.openModal('edit', { 
                        data: {
                            editUserCode: `${cells[1].textContent}-${cells[2].textContent}`,
                            editTenant: `${cells[3].textContent}-${cells[4].textContent}`,
                            editRemark: cells[5].textContent,
                            editIsEnabled: cells[6].querySelector('.status').textContent
                        },
                        reset: false
                    });
                    
                    // 延迟执行，确保模态框已完全打开
                    setTimeout(() => {
                        // 禁用所有输入字段
                        const modal = document.getElementById('editUserTenantModal');
                        if (modal) {
                            // 禁用输入框和文本域
                            modal.querySelectorAll('input[type="text"]').forEach(input => {
                                input.disabled = true;
                            });
                            modal.querySelectorAll('textarea').forEach(textarea => {
                                textarea.disabled = true;
                            });
                            
                            // 禁用自定义选择器
                            modal.querySelectorAll('.custom-select').forEach(select => {
                                select.classList.add('is-disabled');
                                select.style.pointerEvents = 'none';
                                const input = select.querySelector('input');
                                if (input) {
                                    input.disabled = true;
                                }
                            });
                            
                            // 禁用按钮
                            const saveBtn = document.getElementById('editSaveUserTenantBtn');
                            const cancelBtn = document.getElementById('editCancelUserTenantBtn');
                            if (saveBtn) saveBtn.style.display = 'none';
                            if (cancelBtn) cancelBtn.textContent = '关闭';
                        }
                    }, 100);
                }
            });

            page.init();

            const addModalTitle = document.querySelector('#addUserTenantModal .modal-title');
            if (addModalTitle) {
                addModalTitle.textContent = '用户-租户-详情';
            }
            const editModalTitle = document.querySelector('#editUserTenantModal .modal-title');
            if (editModalTitle) {
                editModalTitle.textContent = '用户-租户-详情';
            }

            function setEditModalReadOnly(isReadOnly) {
                const editModal = document.getElementById('editUserTenantModal');
                if (!editModal) return;

                editModal.querySelectorAll('input, textarea, select').forEach((el) => {
                    if (!el.dataset.originDisabled) {
                        el.dataset.originDisabled = el.disabled ? '1' : '0';
                    }
                    el.disabled = isReadOnly ? true : el.dataset.originDisabled === '1';
                });

                editModal.querySelectorAll('.custom-select').forEach((el) => {
                    if (!el.dataset.originPointerEvents) {
                        el.dataset.originPointerEvents = el.style.pointerEvents || '';
                    }
                    el.style.pointerEvents = isReadOnly ? 'none' : el.dataset.originPointerEvents;
                    el.classList.toggle('is-disabled', isReadOnly);
                });

                const saveBtn = document.getElementById('editSaveUserTenantBtn');
                const cancelBtn = document.getElementById('editCancelUserTenantBtn');
                if (saveBtn) saveBtn.style.display = isReadOnly ? 'none' : '';
                if (cancelBtn) cancelBtn.textContent = isReadOnly ? '关闭' : '取消';
            }

            function setEditUserCodeReadOnly() {
                // 移除用户字段的只读设置，使用户字段在编辑模式下可编辑
            }

            const tableBody = document.getElementById('tableBody');
            if (tableBody) {
                tableBody.addEventListener('click', (e) => {
                    if (!e.target.closest('.edit-btn')) return;
                    setTimeout(() => {
                        // 启用所有输入字段
                        const modal = document.getElementById('editUserTenantModal');
                        if (modal) {
                            // 启用输入框和文本域
                            modal.querySelectorAll('input[type="text"]').forEach(input => {
                                input.disabled = false;
                            });
                            modal.querySelectorAll('textarea').forEach(textarea => {
                                textarea.disabled = false;
                            });
                            
                            // 启用自定义选择器
                            modal.querySelectorAll('.custom-select').forEach(select => {
                                select.classList.remove('is-disabled');
                                select.style.pointerEvents = '';
                                const input = select.querySelector('input');
                                if (input) {
                                    input.disabled = false;
                                }
                            });
                            
                            // 启用按钮
                            const saveBtn = document.getElementById('editSaveUserTenantBtn');
                            const cancelBtn = document.getElementById('editCancelUserTenantBtn');
                            if (saveBtn) saveBtn.style.display = '';
                            if (cancelBtn) cancelBtn.textContent = '取消';
                        }
                    }, 100);
                });
            }
        });
    </script>
</body>
</html>
