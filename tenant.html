<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 租户管理</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        #tenantModuleTree.tree-container {
            border: none;
            padding: 8px 0;
        }

        #tenantModuleTree .tree-body {
            background: transparent;
        }

        #tenantModuleTree .tree-node {
            border-bottom: none;
            padding: 4px 0;
        }

        #tenantModuleTree .tree-node:hover {
            background-color: transparent;
        }

        #tenantModuleTree .node-content {
            padding: 4px 0;
        }

        #tenantModuleTree .node-name {
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">租户</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">基础信息 / 租户</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group">
                        <label>租户编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTenantCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>租户名称:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTenantName" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="yes">启用</div>
                                <div class="select-option" data-value="no">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" id="searchBtn">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                        <button type="button" class="btn btn-secondary" id="moduleAuthBtn">模块授权</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>租户编码</th>
                                <th>租户名称</th>
                                <th>公司名称</th>
                                <th>地址</th>
                                <th>联系人</th>
                                <th>电话</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>T001</td>
                                <td>XX科技</td>
                                <td>XX科技有限公司</td>
                                <td>上海市浦东新区...</td>
                                <td>张三</td>
                                <td>18612341234</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>T002</td>
                                <td>测试租户</td>
                                <td>测试公司</td>
                                <td>北京市朝阳区...</td>
                                <td>王五</td>
                                <td>18612341235</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>赵六</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script src="js/tree-component.js"></script>
    <script>
        const moduleData = [
            {
                id: 'node-1',
                code: 'M001',
                name: '基础信息',
                level: '一级',
                remark: '',
                isEnabled: '启用',
                hasChildren: true,
                lazyLoaded: true,
                expanded: false,
                children: [
                    {
                        id: 'node-1-1',
                        code: 'M001-01',
                        name: '仓库管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: true,
                        lazyLoaded: true,
                        expanded: false,
                        children: [
                            {
                                id: 'node-1-1-1',
                                code: 'M001-01-01',
                                name: '仓库查询',
                                level: '三级',
                                remark: '',
                                isEnabled: '启用',
                                hasChildren: false,
                                lazyLoaded: true,
                                expanded: false,
                                children: []
                            },
                            {
                                id: 'node-1-1-2',
                                code: 'M001-01-02',
                                name: '仓库新增',
                                level: '三级',
                                remark: '',
                                isEnabled: '启用',
                                hasChildren: false,
                                lazyLoaded: true,
                                expanded: false,
                                children: []
                            }
                        ]
                    },
                    {
                        id: 'node-1-2',
                        code: 'M001-02',
                        name: '商品管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: false,
                        lazyLoaded: true,
                        expanded: false,
                        children: []
                    }
                ]
            },
            {
                id: 'node-2',
                code: 'M002',
                name: '权限管理',
                level: '一级',
                remark: '',
                isEnabled: '启用',
                hasChildren: true,
                lazyLoaded: true,
                expanded: false,
                children: [
                    {
                        id: 'node-2-1',
                        code: 'M002-01',
                        name: '用户管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: false,
                        lazyLoaded: true,
                        expanded: false,
                        children: []
                    }
                ]
            }
        ];

        let tenantModuleTree = null;

        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '租户',
                statusColumnIndex: 7,
                
                customSelects: [
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                
                fields: [
                    { id: 'tenantCode', label: '租户编码', type: 'text', required: true },
                    { id: 'tenantName', label: '租户名称', type: 'text', required: true },
                    { id: 'companyName', label: '公司名称', type: 'text' },
                    { id: 'address', label: '地址', type: 'text' },
                    { id: 'contactPerson', label: '联系人', type: 'text' },
                    { id: 'phone', label: '电话', type: 'text' },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true,
                      optionSet: 'isEnabled' },
                    { id: 'remark', label: '备注', type: 'textarea', labelWidth: '80px' }
                ],
                
                addModal: {
                    modalId: 'tenantModal',
                    title: '租户-详情',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用' },
                    validations: [
                        { id: 'tenantCode', message: '请输入租户编码', required: true },
                        { id: 'tenantName', message: '请输入租户名称', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const code = document.getElementById('tenantCode').value.trim();
                        const name = document.getElementById('tenantName').value.trim();
                        const companyName = document.getElementById('companyName').value.trim() || '-';
                        const address = document.getElementById('address').value.trim() || '-';
                        const contact = document.getElementById('contactPerson').value.trim() || '-';
                        const phone = document.getElementById('phone').value.trim() || '-';
                        const enabled = document.getElementById('isEnabled').value.trim();
                        
                        page.addTableRow({
                            cells: [
                                code, name, companyName, address, contact, phone,
                                { value: enabled, isStatus: true },
                                page.getCurrentTimeStr(), '当前用户'
                            ]
                        });
                        showToast('租户信息已保存', 'success');
                    }
                },
                
                editModal: {
                    modalId: 'tenantEditModal',
                    title: '租户-详情',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [
                        { id: 'editTenantCode', message: '请输入租户编码', required: true },
                        { id: 'editTenantName', message: '请输入租户名称', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        page.updateTableRow(page.currentEditRow, {
                            1: document.getElementById('editTenantCode').value.trim(),
                            2: document.getElementById('editTenantName').value.trim(),
                            3: document.getElementById('editCompanyName').value.trim() || '-',
                            4: document.getElementById('editAddress').value.trim() || '-',
                            5: document.getElementById('editContactPerson').value.trim() || '-',
                            6: document.getElementById('editPhone').value.trim() || '-',
                            7: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            8: page.getCurrentTimeStr(),
                            9: '当前用户'
                        });
                        showToast('租户信息已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editTenantCode: cells[1].textContent,
                            editTenantName: cells[2].textContent,
                            editCompanyName: cells[3].textContent === '-' ? '' : cells[3].textContent,
                            editAddress: cells[4].textContent === '-' ? '' : cells[4].textContent,
                            editContactPerson: cells[5].textContent === '-' ? '' : cells[5].textContent,
                            editPhone: cells[6].textContent === '-' ? '' : cells[6].textContent,
                            editIsEnabled: cells[7].querySelector('.status').textContent
                        };
                    }
                },
                
                onView: (element) => {
                    const row = element.closest('tr');
                    const cells = row.querySelectorAll('td');
                    
                    // 打开模态框
                    page.openModal('edit', { 
                        data: {
                            editTenantCode: cells[1].textContent,
                            editTenantName: cells[2].textContent,
                            editCompanyName: cells[3].textContent === '-' ? '' : cells[3].textContent,
                            editAddress: cells[4].textContent === '-' ? '' : cells[4].textContent,
                            editContactPerson: cells[5].textContent === '-' ? '' : cells[5].textContent,
                            editPhone: cells[6].textContent === '-' ? '' : cells[6].textContent,
                            editIsEnabled: cells[7].querySelector('.status').textContent
                        },
                        reset: false
                    });
                    
                    // 延迟执行，确保模态框已完全打开
                    setTimeout(() => {
                        // 禁用所有输入字段
                        const modal = document.getElementById('tenantEditModal');
                        if (modal) {
                            // 禁用输入框和文本域
                            modal.querySelectorAll('input[type="text"]').forEach(input => {
                                input.disabled = true;
                            });
                            modal.querySelectorAll('textarea').forEach(textarea => {
                                textarea.disabled = true;
                            });
                            modal.querySelectorAll('.custom-select input').forEach(input => {
                                input.disabled = true;
                            });
                            
                            // 隐藏保存按钮，取消按钮保持可点击
                            const saveBtn = document.getElementById('editSaveBtn');
                            if (saveBtn) {
                                saveBtn.style.display = 'none';
                            }
                            // 取消按钮保持可点击，以便用户可以关闭模态框
                            const cancelBtn = document.getElementById('editCancelBtn');
                            if (cancelBtn) {
                                cancelBtn.disabled = false;
                            }
                        }
                    }, 100);
                },
                

            });

            const ensureModuleAuthModal = () => {
                if (document.getElementById('tenantModuleAuthModal')) return;
                const modalHtml = `
                    <div id="tenantModuleAuthModal" class="modal">
                        <div class="modal-content" style="width: 60%;">
                            <div class="modal-header">
                                <h2 class="modal-title">模块授权</h2>
                                <span class="close" id="tenantModuleAuthCloseBtn">&times;</span>
                            </div>
                            <form class="modal-form">
                                <div class="modal-form-group">
                                    <label style="width: 80px;">租户编码</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="authTenantCode" placeholder="请输入" disabled>
                                    </div>
                                </div>
                                <div class="modal-form-group">
                                    <label style="width: 80px;">租户名称</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="authTenantName" placeholder="请输入" disabled>
                                    </div>
                                </div>
                                <div class="modal-divider"></div>
                                <div class="modal-form-group" style="width: 100%;">
                                    <label style="width: 80px; font-weight: bold; visibility: hidden;">功能模块</label>
                                    <div style="flex: 1; width: 100%;">
                                        <div class="tree-container" id="tenantModuleTree" style="max-height: 300px; min-height: 150px; border: 1px solid #e0e0e0; border-radius: 4px;"></div>
                                    </div>
                                </div>
                            </form>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-primary" id="tenantModuleAuthSaveBtn">保存</button>
                                <button type="button" class="btn btn-secondary" id="tenantModuleAuthCancelBtn">取消</button>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
            };

            const destroyModuleTree = () => {
                if (tenantModuleTree) {
                    tenantModuleTree.destroy();
                    tenantModuleTree = null;
                }
            };

            const initModuleTree = () => {
                destroyModuleTree();
                const container = document.getElementById('tenantModuleTree');
                if (!container) return;
                tenantModuleTree = new TreeComponent({
                    container: container,
                    columns: [{ key: 'name', label: '名称' }],
                    showCheckboxes: true,
                    showActions: false,
                    showHeader: false
                });
                tenantModuleTree.expandedNodes.clear();
                tenantModuleTree.saveState = function() {};
                tenantModuleTree.setData(moduleData);
                tenantModuleTree.expandAll();
            };

            const closeModuleAuthModal = () => {
                const modal = document.getElementById('tenantModuleAuthModal');
                if (modal) modal.style.display = 'none';
                destroyModuleTree();
            };

            const openModuleAuthModal = (row) => {
                const modal = document.getElementById('tenantModuleAuthModal');
                if (!modal || !row) return;
                const cells = row.querySelectorAll('td');
                const codeInput = document.getElementById('authTenantCode');
                const nameInput = document.getElementById('authTenantName');
                if (codeInput) codeInput.value = cells[1]?.textContent.trim() || '';
                if (nameInput) nameInput.value = cells[2]?.textContent.trim() || '';
                modal.style.display = 'block';
                setTimeout(() => initModuleTree(), 100);
            };
            
            page.init();
            ensureModuleAuthModal();

            const moduleAuthBtn = document.getElementById('moduleAuthBtn');
            if (moduleAuthBtn) {
                moduleAuthBtn.addEventListener('click', () => {
                    const selectedCheckboxes = document.querySelectorAll('#tableBody .checkbox-row:checked');
                    if (selectedCheckboxes.length === 0) {
                        showToast('请先选择一个租户', 'warning');
                        return;
                    }
                    if (selectedCheckboxes.length > 1) {
                        showToast('只能选择一个租户进行模块授权', 'warning');
                        return;
                    }
                    const selectedRow = selectedCheckboxes[0].closest('tr');
                    openModuleAuthModal(selectedRow);
                });
            }

            const authCloseBtn = document.getElementById('tenantModuleAuthCloseBtn');
            if (authCloseBtn) authCloseBtn.addEventListener('click', closeModuleAuthModal);

            const authCancelBtn = document.getElementById('tenantModuleAuthCancelBtn');
            if (authCancelBtn) authCancelBtn.addEventListener('click', closeModuleAuthModal);

            const authSaveBtn = document.getElementById('tenantModuleAuthSaveBtn');
            if (authSaveBtn) {
                authSaveBtn.addEventListener('click', () => {
                    if (tenantModuleTree) {
                        const checkedNodes = tenantModuleTree.getCheckedNodes();
                        console.log('选中的模块:', checkedNodes);
                    }
                    showToast('模块授权已保存', 'success');
                    closeModuleAuthModal();
                });
            }

            const authModal = document.getElementById('tenantModuleAuthModal');
            if (authModal) {
                authModal.addEventListener('click', (e) => {
                    if (e.target === authModal) {
                        closeModuleAuthModal();
                    }
                });
            }
        });
    </script>
</body>
</html>
