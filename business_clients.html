<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 往来户管理</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">集货点</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">基础信息 / 往来户</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group">
                        <label>往来户编码:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>往来户名称:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>往来户类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchClientType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchClientTypeDropdown">
                                <div class="select-option" data-value="collect">集货点</div>
                                <div class="select-option" data-value="delivery">配送点</div>
                                <div class="select-option" data-value="supplier">供应商</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="yes">启用</div>
                                <div class="select-option" data-value="no">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>往来户编码</th>
                                <th>往来户名称</th>
                                <th>往来户类型</th>
                                <th>租户</th>
                                <th>委托方</th>
                                <th>公司名称</th>
                                <th>地址</th>
                                <th>联系人</th>
                                <th>电话</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>BC001</td>
                                <td>南京集货点</td>
                                <td>集货点</td>
                                <td>XX集团</td>
                                <td>华东委托方</td>
                                <td>南京集货公司</td>
                                <td>江苏省南京市江陵区...</td>
                                <td>张三</td>
                                <td>18612341234</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>BC002</td>
                                <td>嘉兴集货点</td>
                                <td>集货点</td>
                                <td>XX集团</td>
                                <td>华东委托方</td>
                                <td>嘉兴集货公司</td>
                                <td>浙江省嘉兴市...</td>
                                <td>王五</td>
                                <td>18612341235</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>赵六</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '往来户',
                statusColumnIndex: 10,
                
                customSelects: [
                    { inputId: 'searchClientType', dropdownId: 'searchClientTypeDropdown' },
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                
                fields: [
                    { id: 'tenant', label: '租户', type: 'select', required: true, editDisabled: true,
                      options: [{ value: 'XX集团', text: 'XX集团' }, { value: '测试租户', text: '测试租户' }] },
                    { id: 'company', label: '委托方', type: 'select', required: true, editDisabled: true,
                      options: [{ value: '华东委托方', text: '华东委托方' }, { value: '华北委托方', text: '华北委托方' }] },
                    { id: 'clientCode', label: '往来户编码', type: 'text', required: true, editDisabled: true },
                    { id: 'clientName', label: '往来户名称', type: 'text', required: true, editDisabled: true },
                    { id: 'clientType', label: '往来户类型', type: 'select', required: true, editDisabled: true,
                      options: [{ value: 'collect', text: '集货点' }, { value: 'delivery', text: '配送点' }, { value: 'supplier', text: '供应商' }] },
                    { id: 'companyName', label: '公司名称', type: 'text' },
                    { id: 'address', label: '地址', type: 'text' },
                    { id: 'contactPerson', label: '联系人', type: 'text' },
                    { id: 'phone', label: '电话', type: 'text' },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true,
                      options: [{ value: 'yes', text: '启用' }, { value: 'no', text: '禁用' }] },
                    { id: 'remark', label: '备注', type: 'textarea', labelWidth: '80px' }
                ],
                
                addModal: {
                    modalId: 'clientModal',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用', tenant: 'XX集团', company: '华东委托方' },
                    validations: [
                        { id: 'tenant', message: '请选择租户', required: true },
                        { id: 'company', message: '请选择委托方', required: true },
                        { id: 'clientCode', message: '请输入往来户编码', required: true },
                        { id: 'clientName', message: '请输入往来户名称', required: true },
                        { id: 'clientType', message: '请选择往来户类型', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const tenant = document.getElementById('tenant').value.trim();
                        const company = document.getElementById('company').value.trim();
                        const code = document.getElementById('clientCode').value.trim();
                        const name = document.getElementById('clientName').value.trim();
                        const type = document.getElementById('clientType').value.trim();
                        const enabled = document.getElementById('isEnabled').value.trim();
                        const companyName = document.getElementById('companyName').value.trim() || '-';
                        const address = document.getElementById('address').value.trim() || '-';
                        const contact = document.getElementById('contactPerson').value.trim() || '-';
                        const phone = document.getElementById('phone').value.trim() || '-';
                        
                        page.addTableRow({
                            cells: [
                                code, name, type,
                                tenant, company, companyName,
                                address, contact, phone,
                                { value: enabled, isStatus: true },
                                page.getCurrentTimeStr(), '当前用户'
                            ]
                        });
                        showToast('往来户信息已保存', 'success');
                    }
                },
                
                editModal: {
                    modalId: 'clientEditModal',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [
                        { id: 'editTenant', message: '请选择租户', required: true },
                        { id: 'editCompany', message: '请选择委托方', required: true },
                        { id: 'editClientName', message: '请输入往来户名称', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        page.updateTableRow(page.currentEditRow, {
                            4: document.getElementById('editTenant').value.trim(),
                            5: document.getElementById('editCompany').value.trim(),
                            6: document.getElementById('editCompanyName').value.trim() || '-',
                            7: document.getElementById('editAddress').value.trim() || '-',
                            8: document.getElementById('editContactPerson').value.trim() || '-',
                            9: document.getElementById('editPhone').value.trim() || '-',
                            10: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            11: page.getCurrentTimeStr(),
                            12: '当前用户'
                        });
                        showToast('往来户信息已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editClientCode: cells[1].textContent,
                            editClientName: cells[2].textContent,
                            editClientType: cells[3].textContent,
                            editTenant: cells[4].textContent,
                            editCompany: cells[5].textContent,
                            editCompanyName: cells[6].textContent === '-' ? '' : cells[6].textContent,
                            editAddress: cells[7].textContent === '-' ? '' : cells[7].textContent,
                            editContactPerson: cells[8].textContent === '-' ? '' : cells[8].textContent,
                            editPhone: cells[9].textContent === '-' ? '' : cells[9].textContent,
                            editIsEnabled: cells[10].querySelector('.status').textContent
                        };
                    }
                },
                
                deleteModal: {
                    modalId: 'confirmDeleteModal',
                    closeBtnId: 'confirmDeleteCloseBtn',
                    cancelBtnId: 'cancelDeleteBtn',
                    confirmBtnId: 'confirmDeleteBtn'
                }
            });
            
            page.init();
            
            document.getElementById('editCloseBtn').addEventListener('click', () => page.closeModal('edit'));
        });
    </script>
</body>
</html>
