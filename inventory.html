<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 库存查询</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- 侧边栏容器 -->
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>

    <!-- 顶部导航栏容器 -->
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">库存查询</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">库存管理 / 库存查询</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label style="width: 100px;">仓库:</label>
                        <div class="custom-select">
                            <input type="text" id="searchWarehouse" placeholder="请选择或输入搜索">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchWarehouseDropdown">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="width: 70px;">委托方:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchClient" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>货主:</label>
                        <div class="custom-select">
                            <input type="text" id="searchCompany" placeholder="请选择或输入搜索">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchCompanyDropdown">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="width: 100px;">商品:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSku" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label style="width: 100px;">库存状态:</label>
                        <div class="custom-select">
                            <input type="text" id="searchInventoryStatus" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchInventoryStatusDropdown">
                                <div class="select-option" data-value="normal">正常</div>
                                <div class="select-option" data-value="abnormal">异常</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="width: 70px;">储位:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchLocation" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>容器:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchLpn" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>库存来源类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchSourceType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchSourceTypeDropdown">
                                <div class="select-option" data-value="receive">收货</div>
                                <div class="select-option" data-value="putaway">上架</div>
                                <div class="select-option" data-value="replenish">补货</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>库存来源单号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSourceOrder" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否冻结:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsFrozen" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsFrozenDropdown">
                                <div class="select-option" data-value="true">是</div>
                                <div class="select-option" data-value="false">否</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="searchInventory()">查询</button>
                        <button type="button" class="btn btn-secondary">导出</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>仓库</th>
                                <th>委托方</th>
                                <th>货主</th>
                                <th>商品</th>
                                <th>库存状态</th>
                                <th>库存量</th>
                                <th>占用量</th>
                                <th>储位</th>
                                <th>容器</th>
                                <th>批号</th>
                                <th>入库日期</th>
                                <th>生产日期</th>
                                <th>序列号</th>
                                <th>库存来源类型</th>
                                <th>库存来源单号</th>
                                <th>是否冻结</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 数据将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 引入公共脚本 -->
    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        // 模拟数据
        const inventoryData = [
            {
                warehouse: 'W001-南京仓',
                client: '委托方A',
                company: '货主1',
                sku: '商品A',
                inventoryStatus: '正常',
                quantity: 100,
                occupied: 20,
                location: 'A-01-01',
                lpn: 'LPN001',
                batchNo: 'BATCH20260201001',
                inDate: '2026-02-01',
                productionDate: '2026-01-15',
                serialNo: 'SN001001',
                sourceType: '收货',
                sourceOrder: 'PO001',
                isFrozen: '否',
                updateTime: '2026-02-10 10:00:00',
                updateUser: 'admin'
            },
            {
                warehouse: 'W001-南京仓',
                client: '委托方B',
                company: '货主2',
                sku: '商品B',
                inventoryStatus: '正常',
                quantity: 200,
                occupied: 50,
                location: 'B-02-03',
                lpn: 'LPN002',
                batchNo: 'BATCH20260202002',
                inDate: '2026-02-02',
                productionDate: '2026-01-20',
                serialNo: 'SN002001',
                sourceType: '上架',
                sourceOrder: 'WO001',
                isFrozen: '是',
                updateTime: '2026-02-10 11:00:00',
                updateUser: 'admin'
            },
            {
                warehouse: 'W001-南京仓',
                client: '委托方A',
                company: '货主3',
                sku: '商品C',
                inventoryStatus: '异常',
                quantity: 50,
                occupied: 10,
                location: 'C-03-02',
                lpn: 'LPN003',
                batchNo: 'BATCH20260203003',
                inDate: '2026-02-03',
                productionDate: '2026-01-25',
                serialNo: 'SN003001',
                sourceType: '补货',
                sourceOrder: 'RO001',
                isFrozen: '否',
                updateTime: '2026-02-10 12:00:00',
                updateUser: 'admin'
            }
        ];

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 加载库存数据
                function loadInventoryData() {
                    const tbody = document.querySelector('#tableBody');
                    tbody.innerHTML = '';
                    
                    inventoryData.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                            <td>${item.warehouse}</td>
                            <td>${item.client}</td>
                            <td>${item.company}</td>
                            <td>${item.sku}</td>
                            <td><span class="status ${item.inventoryStatus === '正常' ? 'active' : 'inactive'}">${item.inventoryStatus}</span></td>
                            <td>${item.quantity}</td>
                            <td>${item.occupied}</td>
                            <td>${item.location}</td>
                            <td>${item.lpn}</td>
                            <td>${item.batchNo}</td>
                            <td>${item.inDate}</td>
                            <td>${item.productionDate}</td>
                            <td>${item.serialNo}</td>
                            <td>${item.sourceType}</td>
                            <td>${item.sourceOrder}</td>
                            <td><span class="status ${item.isFrozen === '否' ? 'active' : 'inactive'}">${item.isFrozen}</span></td>
                            <td>${item.updateTime}</td>
                            <td>${item.updateUser}</td>
                            <td class="action-links">
                                ${item.isFrozen === '否' ? '<a href="#" class="freeze-btn">冻结</a>' : ''}
                                ${item.isFrozen === '是' ? '<a href="#" class="unfreeze-btn">解冻</a>' : ''}
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }

                // 搜索库存
                function searchInventory() {
                    // 获取搜索条件
                    const warehouse = document.getElementById('searchWarehouse').value.trim();
                    const client = document.getElementById('searchClient').value.trim();
                    const company = document.getElementById('searchCompany').value.trim();
                    const sku = document.getElementById('searchSku').value.trim();
                    const inventoryStatus = document.getElementById('searchInventoryStatus').value.trim();
                    const location = document.getElementById('searchLocation').value.trim();
                    const lpn = document.getElementById('searchLpn').value.trim();
                    const sourceType = document.getElementById('searchSourceType').value.trim();
                    const sourceOrder = document.getElementById('searchSourceOrder').value.trim();
                    const isFrozen = document.getElementById('searchIsFrozen').value.trim();
                    
                    // 这里可以添加搜索逻辑
                    console.log('搜索条件:', {
                        warehouse,
                        client,
                        company,
                        sku,
                        inventoryStatus,
                        location,
                        lpn,
                        sourceType,
                        sourceOrder,
                        isFrozen
                    });
                    
                    // 模拟搜索结果
                    loadInventoryData();
                }

                // 冻结库存
                function freezeInventory(btn) {
                    // 冻结逻辑已移除
                }

                // 解冻库存
                function unfreezeInventory(btn) {
                    // 解冻逻辑已移除
                }

                // 使用PageManager简化页面逻辑
                const page = new PageManager({
                    entityName: '库存',
                    statusColumnIndex: 16,
                    
                    // 搜索区域下拉框
                    customSelects: [
                        {
                            inputId: 'searchWarehouse',
                            dropdownId: 'searchWarehouseDropdown',
                            options: [
                                { value: 'W001-南京仓', text: 'W001-南京仓' },
                                { value: 'W002-上海仓', text: 'W002-上海仓' },
                                { value: 'W003-北京仓', text: 'W003-北京仓' }
                            ]
                        },
                        {
                            inputId: 'searchCompany',
                            dropdownId: 'searchCompanyDropdown',
                            options: [
                                { value: '货主1', text: '货主1' },
                                { value: '货主2', text: '货主2' },
                                { value: '货主3', text: '货主3' },
                                { value: '货主4', text: '货主4' },
                                { value: '货主5', text: '货主5' }
                            ]
                        },
                        { inputId: 'searchInventoryStatus', dropdownId: 'searchInventoryStatusDropdown' },
                        { inputId: 'searchSourceType', dropdownId: 'searchSourceTypeDropdown' },
                        { inputId: 'searchIsFrozen', dropdownId: 'searchIsFrozenDropdown' }
                    ],
                    
                    deleteModal: {
                        modalId: 'confirmDeleteModal',
                        closeBtnId: 'confirmDeleteCloseBtn',
                        cancelBtnId: 'cancelDeleteBtn',
                        confirmBtnId: 'confirmDeleteBtn'
                    }
                });
                
                page.init();
                
                // 加载初始数据
                loadInventoryData();

                // 绑定冻结/解冻按钮事件（仅阻止默认行为）
                document.addEventListener('click', (e) => {
                    if (e.target.classList.contains('freeze-btn') || e.target.classList.contains('unfreeze-btn')) {
                        e.preventDefault();
                        // 点击逻辑已移除
                    }
                });
            } catch (error) {
                console.error('初始化错误:', error);
                // 避免showToast可能不存在的问题
                if (typeof showToast === 'function') {
                    showToast('页面初始化失败，请刷新重试', 'error');
                }
            }
        });
    </script>
</body>
</html>
