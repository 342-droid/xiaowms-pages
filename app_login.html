<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS - 登录</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body {
            background: linear-gradient(135deg, #004080 0%, #0066cc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 393px;
            height: 851px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .login-header {
            background: #003366;
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .login-header img {
            height: 60px;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 28px;
            margin: 0;
            font-weight: normal;
        }

        .login-header p {
            margin: 10px 0 0;
            opacity: 0.8;
            font-size: 16px;
        }

        .login-form {
            padding: 30px 20px;
            flex: 1;
        }

        .login-form-group {
            margin-bottom: 25px;
        }

        .login-form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }

        .login-form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .login-form-group input:focus {
            outline: none;
            border-color: #004080;
            box-shadow: 0 0 0 3px rgba(0, 64, 128, 0.1);
        }

        .login-form-group input::placeholder {
            color: #999;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #666;
        }

        .remember-me input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: #004080;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background: #003366;
        }

        .login-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        /* Toast提示样式 - 与系统保持一致 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            max-width: 80%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        .toast.error {
            background-color: #f44336;
        }

        .toast.success {
            background-color: #4CAF50;
        }

        .login-footer {
            text-align: center;
            padding: 25px 20px 30px;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #eee;
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .login-header {
                padding: 30px 15px;
            }

            .login-header img {
                height: 50px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .login-form {
                padding: 25px 15px;
            }

            .login-form-group input {
                padding: 14px 16px;
                font-size: 15px;
            }

            .login-btn {
                padding: 16px;
                font-size: 16px;
            }

            .login-footer {
                padding: 20px 15px 25px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="WMS.svg" alt="WMS">
            <h1>WMS</h1>
            <p>仓储管理系统</p>
        </div>
        
        <form class="login-form" id="loginForm">
            
            <div class="login-form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名">
            </div>
            
            <div class="login-form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码">
            </div>
            
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>记住我</span>
                </label>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        </form>
        
        <div class="login-footer">
            © 2026 物流 版权所有
        </div>
    </div>
    
    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // Toast提示函数
        function showToast(message, type = 'error') {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const rememberMe = document.getElementById('rememberMe');

            // 检查是否已记住用户名
            const savedUsername = localStorage.getItem('rememberedUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberMe.checked = true;
            }

            // 模拟用户数据（实际项目中应从后端验证）
            const mockUsers = [
                { username: 'admin', password: '123456', name: '管理员' },
                { username: 'user', password: 'user123', name: '普通用户' }
            ];

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                // 表单验证
                if (!username) {
                    showToast('请输入用户名');
                    usernameInput.focus();
                    return;
                }
                
                if (!password) {
                    showToast('请输入密码');
                    passwordInput.focus();
                    return;
                }

                // 禁用登录按钮，显示加载状态
                loginBtn.disabled = true;
                loginBtn.textContent = '登录中...';

                // 模拟登录请求延迟
                await new Promise(resolve => setTimeout(resolve, 800));

                // 验证用户
                const user = mockUsers.find(u => u.username === username && u.password === password);

                if (user) {
                    // 登录成功
                    if (rememberMe.checked) {
                        localStorage.setItem('rememberedUsername', username);
                    } else {
                        localStorage.removeItem('rememberedUsername');
                    }

                    // 保存登录状态和用户信息
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('currentUser', JSON.stringify({
                        username: user.username,
                        name: user.name
                    }));
                    
                    // 设置标记，让首页知道需要显示仓库选择器
                    sessionStorage.setItem('showWarehouseSelector', 'true');

                    // 跳转到app列表页
                    window.location.href = 'app_list.html';
                } else {
                    // 登录失败
                    showToast('用户名或密码错误');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登 录';
                }
            });

            // 处理键盘事件，提高移动端体验
            usernameInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    passwordInput.focus();
                }
            });

            passwordInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
