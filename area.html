<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 作业区域</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* 页面特定样式 - 作业区域模态框label宽度 */
        .modal-form-group label {
            width: 110px;
        }
    </style>
</head>
<body>
    <!-- 侧边栏容器 -->
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>

    <!-- 顶部导航栏容器 -->
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">作业区域</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">基础信息 / 作业区域</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group">
                        <label>作业区域编码:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>作业区域名称:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="yes">启用</div>
                                <div class="select-option" data-value="no">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>作业区域编码</th>
                                <th>作业区域名称</th>
                                <th>仓库</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>A001</td>
                                <td>南京仓-A区</td>
                                <td>W001-南京仓</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>B001</td>
                                <td>南京仓-B区</td>
                                <td>W001-南京仓</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 引入公共脚本 -->
    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        // 使用PageManager简化页面逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '作业区域',
                statusColumnIndex: 4,
                
                // 搜索区域下拉框
                customSelects: [
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                
                // 字段定义 - 自动生成新增/编辑模态框
                fields: [
                    { id: 'tenant', label: '租户', type: 'select', required: true, editDisabled: true,
                      options: [{ value: 'XX集团', text: 'XX集团' }, { value: '测试租户', text: '测试租户' }] },
                    { id: 'warehouse', label: '仓库', type: 'select', required: true, disabled: true,
                      options: [
                          { value: 'W001', text: 'W001-南京仓' },
                          { value: 'W002', text: 'W002-嘉兴仓' },
                          { value: 'W003', text: 'W003-上海仓' },
                          { value: 'W004', text: 'W004-北京仓' },
                          { value: 'W005', text: 'W005-广州仓' }
                      ] },
                    { id: 'areaCode', label: '作业区域编码', type: 'text', required: true, editDisabled: true },
                    { id: 'areaName', label: '作业区域名称', type: 'text', required: true, editDisabled: true },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true,
                      options: [{ value: 'yes', text: '启用' }, { value: 'no', text: '禁用' }] },
                    { id: 'remark', label: '备注', type: 'textarea', labelWidth: '110px' }
                ],
                
                addModal: {
                    modalId: 'areaModal',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用', tenant: 'XX集团' },
                    validations: [
                        { id: 'tenant', message: '请选择租户', required: true },
                        { id: 'warehouse', message: '请选择仓库', required: true },
                        { id: 'areaCode', message: '请输入作业区域编码', required: true },
                        { id: 'areaName', message: '请输入作业区域名称', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const code = document.getElementById('areaCode').value.trim();
                        const name = document.getElementById('areaName').value.trim();
                        const warehouse = document.getElementById('warehouse').value.trim();
                        const enabled = document.getElementById('isEnabled').value.trim();
                        
                        page.addTableRow({
                            cells: [
                                code,
                                name,
                                warehouse,
                                { value: enabled, isStatus: true },
                                page.getCurrentTimeStr(),
                                '当前用户'
                            ]
                        });
                        showToast('作业区域信息已保存', 'success');
                    }
                },
                
                editModal: {
                    modalId: 'areaEditModal',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [
                        { id: 'editTenant', message: '请选择租户', required: true },
                        { id: 'editAreaName', message: '请输入作业区域名称', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        page.updateTableRow(page.currentEditRow, {
                            2: document.getElementById('editAreaName').value.trim(),
                            4: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            5: page.getCurrentTimeStr(),
                            6: '当前用户'
                        });
                        showToast('作业区域信息已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editTenant: 'XX集团',
                            editAreaCode: cells[1].textContent,
                            editAreaName: cells[2].textContent,
                            editWarehouse: cells[3].textContent,
                            editIsEnabled: cells[4].querySelector('.status').textContent
                        };
                    }
                },
                
                deleteModal: {
                    modalId: 'confirmDeleteModal',
                    closeBtnId: 'confirmDeleteCloseBtn',
                    cancelBtnId: 'cancelDeleteBtn',
                    confirmBtnId: 'confirmDeleteBtn'
                }
            });
            
            page.init();
            document.getElementById('editCloseBtn').addEventListener('click', () => page.closeModal('edit'));
            
            // 新增时设置当前仓库
            document.getElementById('addBtn').addEventListener('click', () => {
                const currentWarehouse = getCurrentWarehouse();
                if (currentWarehouse) {
                    const warehouseInput = document.getElementById('warehouse');
                    warehouseInput.value = `${currentWarehouse.code}-${currentWarehouse.name}`;
                    warehouseInput.dataset.value = currentWarehouse.code;
                }
            });
        });
    </script>
</body>
</html>
