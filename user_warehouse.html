<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 用户-仓库</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* 页面特定样式 - 与作业档案页面保持一致 */
        .modal-form-group label {
            width: 110px;
        }

        /* 自定义下拉禁用态样式 */
        .custom-select.is-disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .custom-select.is-disabled input {
            background-color: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .custom-select.is-disabled .select-arrow,
        .custom-select.is-disabled .clear-btn {
            color: #bbb;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">用户-仓库</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">权限管理 / 用户-仓库</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>仓库:</label>
                        <div class="custom-select">
                            <input type="text" id="searchWarehouse" placeholder="请选择" required>
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchWarehouseDropdown">
                                <div class="select-option" data-value="W001">W001-南京仓</div>
                                <div class="select-option" data-value="W002">W002-嘉兴仓</div>
                                <div class="select-option" data-value="W003">W003-上海仓</div>
                                <div class="select-option" data-value="W004">W004-北京仓</div>
                                <div class="select-option" data-value="W005">W005-广州仓</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>用户编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchUserCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>作业档案编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchProfileCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>作业档案名称:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchProfileName" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="yes">启用</div>
                                <div class="select-option" data-value="no">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" id="searchBtn">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>用户编码</th>
                                <th>用户名称</th>
                                <th>作业档案编码</th>
                                <th>作业档案名称</th>
                                <th>仓库</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>U001</td>
                                <td>张三</td>
                                <td>P001</td>
                                <td>标准作业档案</td>
                                <td>W001-南京仓</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>U002</td>
                                <td>李四</td>
                                <td>P002</td>
                                <td>冷链作业档案</td>
                                <td>W001-南京仓</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="view-btn">查看</a>
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 引入公共脚本 -->
    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        // 使用PageManager简化页面逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const userOptions = [
                { value: 'U001', text: 'U001-张三' },
                { value: 'U002', text: 'U002-李四' },
                { value: 'U003', text: 'U003-王五' },
                { value: 'U004', text: 'U004-赵六' }
            ];
            
            const page = new PageManager({
                entityName: '用户-仓库',
                statusColumnIndex: 5,
                
                customSelects: [
                    { inputId: 'searchWarehouse', dropdownId: 'searchWarehouseDropdown' },
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                
                fields: [
                    { id: 'userCode', label: '用户编码', type: 'select', required: true, editDisabled: false, placeholder: '请选择', options: userOptions },
                    { id: 'warehouse', label: '仓库', type: 'select', required: true, options: CommonOptions.warehouse },
                    { id: 'profile', label: '作业档案', type: 'select', required: true, options: CommonOptions.profile },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true, options: CommonOptions.isEnabled },
                    { id: 'remark', label: '备注', type: 'textarea', labelWidth: '110px' }
                ],
                
                addModal: {
                    modalId: 'addUserProfileModal',
                    saveBtnId: 'saveUserProfileBtn',
                    cancelBtnId: 'cancelUserProfileBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用' },
                    validations: [
                        { id: 'userCode', message: '请选择用户编码', required: true },
                        { id: 'warehouse', message: '请选择仓库', required: true },
                        { id: 'profile', message: '请选择作业档案', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const userInput = document.getElementById('userCode');
                        const userText = userInput ? userInput.value.trim() : '';
                        const userDataValue = userInput ? (userInput.dataset.value || '').trim() : '';
                        const matchedUser = userOptions.find(item => item.value === userDataValue || item.text === userText);
                        const userDisplay = matchedUser ? matchedUser.text : userText;
                        const [userCode, ...nameParts] = userDisplay.split('-');
                        const userName = nameParts.join('-');
                        if (!userCode || !userName) {
                            showToast('请选择有效的用户编码');
                            if (userInput) userInput.focus();
                            return;
                        }
                        const warehouse = document.getElementById('warehouse').value.trim();
                        const profile = document.getElementById('profile').value.trim();
                        const enabled = document.getElementById('isEnabled').value.trim();
                        const [profileCode, ...profileNameParts] = profile.split('-');
                        const profileName = profileNameParts.join('-');
                        
                        page.addTableRow({
                            cells: [
                                userCode,
                                userName,
                                profileCode,
                                profileName,
                                warehouse,
                                { value: enabled, isStatus: true },
                                page.getCurrentTimeStr(),
                                '当前用户'
                            ]
                        });
                        showToast('用户-仓库信息已保存', 'success');
                    }
                },
                
                editModal: {
                    modalId: 'editUserProfileModal',
                    saveBtnId: 'editSaveUserProfileBtn',
                    cancelBtnId: 'editCancelUserProfileBtn',
                    validations: [
                        { id: 'editUserCode', message: '请选择用户编码', required: true },
                        { id: 'editWarehouse', message: '请选择仓库', required: true },
                        { id: 'editProfile', message: '请选择作业档案', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        const userInput = document.getElementById('editUserCode');
                        const userText = userInput ? userInput.value.trim() : '';
                        const userDataValue = userInput ? (userInput.dataset.value || '').trim() : '';
                        const matchedUser = userOptions.find(item => item.value === userDataValue || item.text === userText);
                        const userDisplay = matchedUser ? matchedUser.text : userText;
                        const [userCode, ...nameParts] = userDisplay.split('-');
                        const userName = nameParts.join('-');
                        if (!userCode || !userName) {
                            showToast('请选择有效的用户编码');
                            if (userInput) userInput.focus();
                            return;
                        }
                        const profile = document.getElementById('editProfile').value.trim();
                        const [profileCode, ...profileNameParts] = profile.split('-');
                        const profileName = profileNameParts.join('-');
                        page.updateTableRow(page.currentEditRow, {
                            1: userCode,
                            2: userName,
                            5: document.getElementById('editWarehouse').value.trim(),
                            3: profileCode,
                            4: profileName,
                            6: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            7: page.getCurrentTimeStr(),
                            8: '当前用户'
                        });
                        showToast('用户-仓库信息已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editUserCode: `${cells[1].textContent}-${cells[2].textContent}`,
                            editProfile: `${cells[3].textContent}-${cells[4].textContent}`,
                            editWarehouse: cells[5].textContent,
                            editIsEnabled: cells[6].querySelector('.status').textContent
                        };
                    }
                },
                
                deleteModal: {}
            });
            
            page.init();

            // 新增/编辑弹窗标题统一为“用户-仓库-详情”
            const addModalTitle = document.querySelector('#addUserProfileModal .modal-title');
            if (addModalTitle) {
                addModalTitle.textContent = '用户-仓库-详情';
            }
            const editModalTitle = document.querySelector('#editUserProfileModal .modal-title');
            if (editModalTitle) {
                editModalTitle.textContent = '用户-仓库-详情';
            }

            function setEditModalReadOnly(isReadOnly) {
                const editModal = document.getElementById('editUserProfileModal');
                if (!editModal) return;

                editModal.querySelectorAll('input, textarea, select').forEach((el) => {
                    if (!el.dataset.originDisabled) {
                        el.dataset.originDisabled = el.disabled ? '1' : '0';
                    }
                    el.disabled = isReadOnly ? true : el.dataset.originDisabled === '1';
                });

                editModal.querySelectorAll('.custom-select').forEach((el) => {
                    if (!el.dataset.originPointerEvents) {
                        el.dataset.originPointerEvents = el.style.pointerEvents || '';
                    }
                    el.style.pointerEvents = isReadOnly ? 'none' : el.dataset.originPointerEvents;
                    el.classList.toggle('is-disabled', isReadOnly);
                });

                const saveBtn = document.getElementById('editSaveUserProfileBtn');
                const cancelBtn = document.getElementById('editCancelUserProfileBtn');
                if (saveBtn) saveBtn.style.display = isReadOnly ? 'none' : '';
                if (cancelBtn) cancelBtn.textContent = isReadOnly ? '关闭' : '取消';
            }

            const tableBody = document.getElementById('tableBody');
            if (tableBody) {
                tableBody.addEventListener('click', (e) => {
                    const cell = e.target.closest('td');
                    const row = e.target.closest('tr');
                    if (!cell || !row) return;
                    const colIndex = Array.from(row.children).indexOf(cell);
                    if (colIndex !== 1) return;
                    if (page.config.editModal && page.config.editModal.mapRowToForm) {
                        const data = page.config.editModal.mapRowToForm(row);
                        page.openModal('edit', { data, reset: false });
                        setEditModalReadOnly(true);
                    }
                });

                // 点击查看按钮时设置为只读模式
                tableBody.addEventListener('click', (e) => {
                    if (!e.target.closest('.view-btn')) return;
                    if (page.config.editModal && page.config.editModal.mapRowToForm) {
                        const row = e.target.closest('tr');
                        if (row) {
                            const data = page.config.editModal.mapRowToForm(row);
                            page.openModal('edit', { data, reset: false });
                            setEditModalReadOnly(true);
                        }
                    }
                });

                // 点击编辑按钮时恢复可编辑态
                tableBody.addEventListener('click', (e) => {
                    if (!e.target.closest('.edit-btn')) return;
                    setTimeout(() => setEditModalReadOnly(false), 0);
                });
            }



            // 查询条件：仓库改为必填
            const searchBtn = document.getElementById('searchBtn');
            if (searchBtn) {
                searchBtn.addEventListener('click', () => {
                    const searchWarehouseInput = document.getElementById('searchWarehouse');
                    const warehouse = searchWarehouseInput ? searchWarehouseInput.value.trim() : '';
                    if (!warehouse) {
                        showToast('请选择仓库');
                        if (searchWarehouseInput) searchWarehouseInput.focus();
                        return;
                    }
                    location.reload();
                });
            }

        });
    </script>
</body>
</html>
