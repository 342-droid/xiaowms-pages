<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 作业档案</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* 页面特定样式 - 作业档案模态框label宽度 */
        .modal-form-group label {
            width: 110px;
        }

        .profile-code-link {
            color: #1677ff;
            text-decoration: none;
            cursor: pointer;
        }

        .profile-code-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">作业档案</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">基础信息 / 作业档案</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>仓库:</label>
                        <div class="custom-select">
                            <input type="text" id="searchWarehouse" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchWarehouseDropdown">
                                <div class="select-option" data-value="W001-南京仓">W001-南京仓</div>
                                <div class="select-option" data-value="W002-嘉兴仓">W002-嘉兴仓</div>
                                <div class="select-option" data-value="W003-上海仓">W003-上海仓</div>
                                <div class="select-option" data-value="W004-北京仓">W004-北京仓</div>
                                <div class="select-option" data-value="W005-广州仓">W005-广州仓</div>
                                <div class="select-option" data-value="W006-深圳仓">W006-深圳仓</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>作业档案编码:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>作业档案名称:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="yes">启用</div>
                                <div class="select-option" data-value="no">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>作业档案编码</th>
                                <th>作业档案名称</th>
                                <th>租户</th>
                                <th>仓库</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td><a href="#" class="profile-code-link">P001</a></td>
                                <td>标准作业档案</td>
                                <td>T001-南京租户</td>
                                <td>W001-南京仓</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td><a href="#" class="profile-code-link">P002</a></td>
                                <td>冷链作业档案</td>
                                <td>T002-北京租户</td>
                                <td>W001-南京仓</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 添加明细模态框 -->
    <div id="detailModal" class="modal" style="display: none; align-items: flex-start; padding-top: 7%; z-index: 3001;">
        <div class="modal-content" style="width: 620px; max-height: 88vh; min-height: 520px; margin: 0 auto; display: flex; flex-direction: column;">
            <div class="modal-header" style="margin-bottom: 15px;">
                <h2 class="modal-title">添加明细</h2>
                <span class="close" id="detailCloseBtn">&times;</span>
            </div>
            <form class="modal-form" style="display: flex; flex-direction: column; flex-wrap: nowrap; align-content: flex-start; justify-content: flex-start; gap: 8px; flex: 1;">
                <div class="modal-form-group custom-select-wrapper" style="width: 100%;">
                    <label>作业区域 <span style="color: red;">*</span></label>
                    <div class="custom-select">
                        <input type="text" id="detailArea" placeholder="请选择">
                        <span class="select-arrow">▼</span>
                        <span class="clear-btn">×</span>
                        <div class="select-dropdown" id="detailAreaDropdown">
                            <div class="select-option" data-value="A001" data-name="南京仓-A区">A001-南京仓-A区</div>
                            <div class="select-option" data-value="B001" data-name="南京仓-B区">B001-南京仓-B区</div>
                        </div>
                    </div>
                </div>
                <div class="modal-form-group custom-select-wrapper" style="width: 100%;">
                    <label>作业类型 <span style="color: red;">*</span></label>
                    <div class="custom-select">
                        <input type="text" id="detailWorkType" placeholder="请选择">
                        <span class="select-arrow">▼</span>
                        <span class="clear-btn">×</span>
                        <div class="select-dropdown" id="detailWorkTypeDropdown">
                            <div class="select-option" data-value="质检">质检</div>
                            <div class="select-option" data-value="上架">上架</div>
                            <div class="select-option" data-value="拣货">拣货</div>
                            <div class="select-option" data-value="盘点">盘点</div>
                        </div>
                    </div>
                </div>
            </form>
            <div class="modal-footer" style="margin-top: auto; padding-top: 15px;">
                <button type="button" class="btn btn-secondary" id="detailCancelBtn">取消</button>
                <button type="button" class="btn btn-primary" id="detailSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 引入公共脚本 -->
    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        // 使用PageManager简化页面逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '作业档案',
                statusColumnIndex: 5,
                
                customSelects: [
                    { inputId: 'searchWarehouse', dropdownId: 'searchWarehouseDropdown' },
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                
                fields: [
                    { id: 'profileCode', label: '作业档案编码', type: 'text', required: true, editDisabled: true },
                    { id: 'profileName', label: '作业档案名称', type: 'text', required: true, editDisabled: true },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true, options: CommonOptions.isEnabled },
                    { id: 'remark', label: '备注', type: 'textarea', labelWidth: '110px' },
                    { 
                        type: 'raw', 
                        editHtml: `
                            <div class="modal-form-group" style="width: 100%; flex-direction: column; align-items: flex-start; gap: 10px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                                    <label style="width: auto;">作业档案明细</label>
                                    <div style="display: flex; gap: 10px;">
                                        <button type="button" class="btn btn-primary" id="editAddDetailBtn">添加明细</button>
                                        <button type="button" class="btn btn-primary" id="editSaveProfileBtn">保存</button>
                                        <button type="button" class="btn btn-secondary" id="editCancelProfileBtn">取消</button>
                                    </div>
                                </div>
                                <div class="table-scroll-container" style="width: 100%; max-height: 200px; overflow-y: auto;">
                                    <table class="table" id="editDetailTable">
                                        <thead>
                                            <tr>
                                                <th>作业区域编码</th>
                                                <th>作业区域名称</th>
                                                <th>作业类型</th>
                                                <th>更新时间</th>
                                                <th>更新人</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody id="editDetailTableBody">
                                            <tr>
                                                <td>A001</td>
                                                <td>南京仓-A区</td>
                                                <td>质检</td>
                                                <td>2025-01-05 12:31:43</td>
                                                <td>李四</td>
                                                <td class="action-links">
                                                    <a href="#" class="detail-edit-btn">编辑</a>
                                                    <a href="#" class="detail-delete-btn delete-btn">删除</a>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>A001</td>
                                                <td>南京仓-A区</td>
                                                <td>上架</td>
                                                <td>2025-01-05 12:31:43</td>
                                                <td>李四</td>
                                                <td class="action-links">
                                                    <a href="#" class="detail-edit-btn">编辑</a>
                                                    <a href="#" class="detail-delete-btn delete-btn">删除</a>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>B001</td>
                                                <td>南京仓-B区</td>
                                                <td>拣货</td>
                                                <td>2025-01-05 12:31:43</td>
                                                <td>李四</td>
                                                <td class="action-links">
                                                    <a href="#" class="detail-edit-btn">编辑</a>
                                                    <a href="#" class="detail-delete-btn delete-btn">删除</a>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <style>
                                #editProfileModal .modal-footer {
                                    display: none !important;
                                }
                            </style>
                        `
                    }
                ],
                
                addModal: {
                    modalId: 'addProfileModal',
                    saveBtnId: 'saveProfileBtn',
                    cancelBtnId: 'cancelProfileBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用', tenant: 'T001-南京租户' },
                    validations: [
                        { id: 'profileCode', message: '请输入作业档案编码', required: true },
                        { id: 'profileName', message: '请输入作业档案名称', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onOpen: () => {
                        // 保留扩展点：新增弹窗当前无需额外预处理
                    },
                    onSave: () => {
                        const code = document.getElementById('profileCode').value.trim();
                        const name = document.getElementById('profileName').value.trim();
                        const tenant = 'T001-南京租户';
                        const currentWarehouse = getCurrentWarehouse();
                        const warehouse = currentWarehouse
                            ? `${currentWarehouse.code}-${currentWarehouse.name}`
                            : ((window.CommonOptions && CommonOptions.warehouse && CommonOptions.warehouse[0] && CommonOptions.warehouse[0].text) || '');
                        const enabled = document.getElementById('isEnabled').value.trim();
                        
                        page.addTableRow({
                            cells: [
                                `<a href="#" class="profile-code-link">${code}</a>`,
                                name,
                                tenant,
                                warehouse,
                                { value: enabled, isStatus: true },
                                page.getCurrentTimeStr(),
                                '当前用户'
                            ]
                        });
                        showToast('作业档案信息已保存', 'success');
                    }
                },
                
                editModal: {
                    modalId: 'editProfileModal',
                    saveBtnId: 'editSaveProfileBtn',
                    cancelBtnId: 'editCancelProfileBtn',
                    validations: [
                        { id: 'editProfileName', message: '请输入作业档案名称', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        page.updateTableRow(page.currentEditRow, {
                            2: document.getElementById('editProfileName').value.trim(),
                            5: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            6: page.getCurrentTimeStr(),
                            7: '当前用户'
                        });
                        showToast('作业档案信息已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editProfileCode: cells[1].textContent,
                            editProfileName: cells[2].textContent,
                            editIsEnabled: cells[5].querySelector('.status').textContent
                        };
                    }
                },
                
                deleteModal: {}
            });
            
            page.init();

            function setEditModalReadOnly(isReadOnly) {
                const editModal = document.getElementById('editProfileModal');
                if (!editModal) return;

                editModal.querySelectorAll('input[type="text"], textarea').forEach((el) => {
                    if (!el.dataset.originDisabled) {
                        el.dataset.originDisabled = el.disabled ? '1' : '0';
                    }
                    el.disabled = isReadOnly ? true : el.dataset.originDisabled === '1';
                });

                const addBtn = document.getElementById('editAddDetailBtn');
                const saveBtn = document.getElementById('editSaveProfileBtn');
                const cancelBtn = document.getElementById('editCancelProfileBtn');
                const titleEl = editModal.querySelector('.modal-title');
                if (addBtn) addBtn.style.display = isReadOnly ? 'none' : '';
                if (saveBtn) saveBtn.style.display = isReadOnly ? 'none' : '';
                if (cancelBtn) cancelBtn.textContent = isReadOnly ? '关闭' : '取消';
                if (titleEl) titleEl.textContent = isReadOnly ? '作业档案-详情' : '作业档案-编辑';

                const th = editModal.querySelector('#editDetailTable thead th:last-child');
                if (th) th.style.display = isReadOnly ? 'none' : '';
                editModal.querySelectorAll('#editDetailTable tbody td:last-child').forEach((td) => {
                    td.style.display = isReadOnly ? 'none' : '';
                });
            }

            function openProfileDetailReadonly(row) {
                if (!row) return;
                if (page.config.editModal && page.config.editModal.mapRowToForm) {
                    const data = page.config.editModal.mapRowToForm(row);
                    page.openModal('edit', { data, reset: false });
                    setEditModalReadOnly(true);
                }
            }
            
            // 初始化明细模态框的下拉框
            if (typeof initCustomSelect === 'function') {
                initCustomSelect('detailArea', 'detailAreaDropdown');
                initCustomSelect('detailWorkType', 'detailWorkTypeDropdown');
            }

            // 查询条件：仓库默认取当前登录仓库，置灰且不可编辑
            const searchWarehouseInput = document.getElementById('searchWarehouse');
            const applySearchWarehouse = () => {
                if (!searchWarehouseInput) return;
                const currentWarehouse = getCurrentWarehouse();
                if (currentWarehouse) {
                    searchWarehouseInput.value = `${currentWarehouse.code}-${currentWarehouse.name}`;
                    searchWarehouseInput.dataset.value = currentWarehouse.code;
                }
            };
            if (searchWarehouseInput) {
                applySearchWarehouse();
                searchWarehouseInput.disabled = true;
                searchWarehouseInput.readOnly = true;
                const searchWarehouseSelect = searchWarehouseInput.closest('.custom-select');
                if (searchWarehouseSelect) {
                    searchWarehouseSelect.style.pointerEvents = 'none';
                }
                document.addEventListener('warehouseChange', applySearchWarehouse);
            }
            
            // 明细模态框逻辑
            const detailSaveBtn = document.getElementById('detailSaveBtn');
            const detailModalTitle = document.querySelector('#detailModal .modal-title');
            const detailModalController = window.WMSUI.createModalController({
                modalId: 'detailModal',
                closeButtonIds: ['detailCloseBtn', 'detailCancelBtn']
            });
            
            let currentDetailTarget = null; // 'add' | 'edit'
            let currentEditingDetailRow = null;
            
            // 打开明细模态框
            function openDetailModal(target, row = null) {
                currentDetailTarget = target;
                currentEditingDetailRow = row;
                detailModalController.open();
                const areaInput = document.getElementById('detailArea');
                const workTypeInput = document.getElementById('detailWorkType');
                if (!areaInput || !workTypeInput) return;

                // 清空表单
                areaInput.value = '';
                areaInput.dataset.value = '';
                workTypeInput.value = '';
                workTypeInput.dataset.value = '';

                if (target === 'edit' && row) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 3) {
                        const areaCode = cells[0].textContent.trim();
                        const areaName = cells[1].textContent.trim();
                        const workType = cells[2].textContent.trim();
                        areaInput.value = `${areaCode}-${areaName}`;
                        areaInput.dataset.value = areaCode;
                        workTypeInput.value = workType;
                        workTypeInput.dataset.value = workType;
                    }
                    if (detailModalTitle) detailModalTitle.textContent = '编辑明细';
                    if (detailSaveBtn) detailSaveBtn.textContent = '保存';
                } else {
                    if (detailModalTitle) detailModalTitle.textContent = '添加明细';
                    if (detailSaveBtn) detailSaveBtn.textContent = '保存';
                }
            }
            
            // 关闭明细模态框
            function closeDetailModal() {
                detailModalController.close();
                currentDetailTarget = null;
                currentEditingDetailRow = null;
            }
            
            // 明细模态框事件绑定（使用事件委托，因为按钮是动态生成的）
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('profile-code-link')) {
                    e.preventDefault();
                    openProfileDetailReadonly(e.target.closest('tr'));
                    return;
                }
                if (e.target.classList.contains('edit-btn')) {
                    setTimeout(() => setEditModalReadOnly(false), 0);
                }
                if (e.target.id === 'editAddDetailBtn') {
                    e.preventDefault();
                    openDetailModal('add');
                }
                if (e.target.classList.contains('detail-edit-btn')) {
                    e.preventDefault();
                    openDetailModal('edit', e.target.closest('tr'));
                }
            });
            
            // 保存明细
            if (detailSaveBtn) {
                detailSaveBtn.addEventListener('click', () => {
                    const areaInput = document.getElementById('detailArea');
                    const workTypeInput = document.getElementById('detailWorkType');
                    if (!areaInput || !workTypeInput) return;
                    
                    const areaCode = areaInput.dataset.value || '';
                    const areaText = areaInput.value.trim();
                    const selectedWorkType = workTypeInput.dataset.value || workTypeInput.value.trim();
                    
                    if (!areaCode) {
                        showToast('请选择作业区域', 'error');
                        return;
                    }
                    if (!selectedWorkType) {
                        showToast('请选择作业类型', 'error');
                        return;
                    }
                    
                    // 从选中的文本中提取区域名称（格式：A001-南京仓-A区）
                    const areaName = areaText.substring(areaText.indexOf('-') + 1);

                    // 检查重复数据
                    const existingRows = document.querySelectorAll('#editDetailTableBody tr');
                    const existingData = [];
                    existingRows.forEach(row => {
                        if (currentDetailTarget === 'edit' && row === currentEditingDetailRow) return;
                        const cells = row.querySelectorAll('td');
                        if (cells.length >= 3) {
                            existingData.push({
                                areaCode: cells[0].textContent,
                                workType: cells[2].textContent
                            });
                        }
                    });
                    
                    // 检查是否有重复
                    const isDuplicate = existingData.some(item => item.areaCode === areaCode && item.workType === selectedWorkType);
                    if (isDuplicate) {
                        showToast('已存在重复内容，请检查！', 'error');
                        return;
                    }
                    
                    const now = new Date();
                    const timeStr = now.getFullYear() + '-' + 
                        String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(now.getDate()).padStart(2, '0') + ' ' +
                        String(now.getHours()).padStart(2, '0') + ':' +
                        String(now.getMinutes()).padStart(2, '0') + ':' +
                        String(now.getSeconds()).padStart(2, '0');

                    if (currentDetailTarget === 'edit' && currentEditingDetailRow) {
                        const editCells = currentEditingDetailRow.querySelectorAll('td');
                        if (editCells.length >= 5) {
                            editCells[0].textContent = areaCode;
                            editCells[1].textContent = areaName;
                            editCells[2].textContent = selectedWorkType;
                            editCells[3].textContent = timeStr;
                            editCells[4].textContent = '当前用户';
                        }
                        showToast('明细已更新', 'success');
                        closeDetailModal();
                        return;
                    }
                    
                    const newRow = `
                        <tr>
                            <td>${areaCode}</td>
                            <td>${areaName}</td>
                            <td>${selectedWorkType}</td>
                            <td>${timeStr}</td>
                            <td>当前用户</td>
                            <td class="action-links">
                                <a href="#" class="detail-edit-btn">编辑</a>
                                <a href="#" class="detail-delete-btn delete-btn">删除</a>
                            </td>
                        </tr>
                    `;
                    const editDetailTableBody = document.getElementById('editDetailTableBody');
                    if (editDetailTableBody) {
                        editDetailTableBody.insertAdjacentHTML('beforeend', newRow);
                    }
                    
                    showToast('明细已添加', 'success');
                    closeDetailModal();
                });
            }
            
            // 明细删除事件委托
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('detail-delete-btn')) {
                    e.preventDefault();
                    const row = e.target.closest('tr');
                    if (row) {
                        row.remove();
                        showToast('明细已删除', 'success');
                    }
                }
            });
        });
    </script>
</body>
</html>
