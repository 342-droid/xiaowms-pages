<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 波次流程</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">波次流程</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">策略管理 / 波次流程</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>流程类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchFlowType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchFlowTypeDropdown">
                                <div class="select-option" data-value="">全部</div>
                                <div class="select-option" data-value="拣货打包发货">拣货打包发货</div>
                                <div class="select-option" data-value="拣货2b分拣打包发货">拣货2b分拣打包发货</div>
                                <div class="select-option" data-value="拣货2c分拣复核打包发货">拣货2c分拣复核打包发货</div>
                                <div class="select-option" data-value="边拣边分复核打包发货">边拣边分复核打包发货</div>
                                <div class="select-option" data-value="拣货复核打包发货">拣货复核打包发货</div>
                                <div class="select-option" data-value="一键出库">一键出库</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="">全部</div>
                                <div class="select-option" data-value="是">是</div>
                                <div class="select-option" data-value="否">否</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>流程类型</th>
                                <th>流程描述</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>拣货打包发货</td>
                                <td>标准拣货打包发货流程</td>
                                <td>是</td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>拣货2b分拣打包发货</td>
                                <td>2B业务分拣流程</td>
                                <td>是</td>
                                <td>2025-01-06 09:15:22</td>
                                <td>王五</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '波次流程',
                
                customSelects: [
                    { inputId: 'searchFlowType', dropdownId: 'searchFlowTypeDropdown' },
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                
                fields: [
                    {
                        id: 'tenant',
                        label: '租户',
                        type: 'select',
                        required: true,
                        disabled: true,
                        editDisabled: true,
                        options: [
                            { value: 'XX集团', text: 'XX集团' },
                            { value: '测试租户', text: '测试租户' }
                        ]
                    },
                    { 
                        id: 'flowType', 
                        label: '流程类型', 
                        type: 'select', 
                        required: true,
                        editDisabled: true,
                        options: [
                            { value: '拣货打包发货', text: '拣货打包发货' },
                            { value: '拣货2b分拣打包发货', text: '拣货2b分拣打包发货' },
                            { value: '拣货2c分拣复核打包发货', text: '拣货2c分拣复核打包发货' },
                            { value: '边拣边分复核打包发货', text: '边拣边分复核打包发货' },
                            { value: '拣货复核打包发货', text: '拣货复核打包发货' },
                            { value: '一键出库', text: '一键出库' }
                        ]
                    },
                    { id: 'flowDesc', label: '流程描述', type: 'text', required: true },
                    { 
                        id: 'isEnabled', 
                        label: '是否启用', 
                        type: 'select', 
                        required: true,
                        optionSet: 'yesNoText'
                    }
                ],
                
                addModal: {
                    modalId: 'waveFlowModal',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '是', tenant: 'XX集团' },
                    validations: [
                        { id: 'tenant', message: '请选择租户', required: true },
                        { id: 'flowType', message: '请选择流程类型', required: true },
                        { id: 'flowDesc', message: '请输入流程描述', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const flowType = document.getElementById('flowType').value;
                        const flowDesc = document.getElementById('flowDesc').value.trim();
                        const isEnabled = document.getElementById('isEnabled').value;
                        
                        page.addTableRow({
                            cells: [
                                flowType, flowDesc, isEnabled,
                                page.getCurrentTimeStr(), '当前用户'
                            ]
                        });
                        showToast('波次流程已保存', 'success');
                    }
                },
                
                editModal: {
                    modalId: 'waveFlowEditModal',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [
                        { id: 'editTenant', message: '请选择租户', required: true },
                        { id: 'editFlowDesc', message: '请输入流程描述', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        page.updateTableRow(page.currentEditRow, {
                            2: document.getElementById('editFlowDesc').value.trim(),
                            3: document.getElementById('editIsEnabled').value,
                            4: page.getCurrentTimeStr(),
                            5: '当前用户'
                        });
                        showToast('波次流程已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editTenant: 'XX集团',
                            editFlowType: cells[1].textContent,
                            editFlowDesc: cells[2].textContent,
                            editIsEnabled: cells[3].textContent
                        };
                    }
                },
                
                deleteModal: {}
            });
            
            page.init();

            // 新增时自动填充租户（参考 lpn 页面行为）
            document.getElementById('addBtn').addEventListener('click', () => {
                const tenantInput = document.getElementById('tenant');
                if (!tenantInput) return;
                tenantInput.value = 'XX集团';
                tenantInput.dataset.value = 'XX集团';
            });
            
        });
    </script>
</body>
</html>
