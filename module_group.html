<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 系统功能角色</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* 自定义树状结构样式 */
        #moduleGroupModuleTree.tree-container {
            border: none;
            padding: 8px 0;
        }
        
        #moduleGroupModuleTree .tree-body {
            background: transparent;
        }
        
        #moduleGroupModuleTree .tree-node {
            border-bottom: none;
            padding: 4px 0;
        }
        
        #moduleGroupModuleTree .tree-node:hover {
            background-color: transparent;
        }
        
        #moduleGroupModuleTree .node-content {
            padding: 4px 0;
        }
        
        #moduleGroupModuleTree .node-name {
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">系统功能角色</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">权限管理 / 系统功能角色</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>租户:</label>
                        <div class="custom-select">
                            <input type="text" id="searchTenant" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchTenantDropdown"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>功能角色编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchModuleGroupCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>功能角色名称:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchModuleGroupName" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>功能模块编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchModuleCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>功能角色编码</th>
                                <th>功能角色名称</th>
                                <th>备注</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>MG001</td>
                                <td>管理员</td>
                                <td>系统管理员角色</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-07 10:30:00</td>
                                <td>张三</td>
                                <td class="action-links">
                                    <a href="#" class="detail-edit-btn">编辑</a>
                                    <a href="#" class="edit-btn">模块授权</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>MG002</td>
                                <td>仓管员</td>
                                <td>仓库管理员角色</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-07 09:15:00</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="detail-edit-btn">编辑</a>
                                    <a href="#" class="edit-btn">模块授权</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>MG003</td>
                                <td>质检员</td>
                                <td></td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2025-01-06 14:20:00</td>
                                <td>王五</td>
                                <td class="action-links">
                                    <a href="#" class="detail-edit-btn">编辑</a>
                                    <a href="#" class="edit-btn">模块授权</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script src="js/tree-component.js"></script>
    <script>
        // 模块数据
        const moduleData = [
            {
                id: 'node-1',
                code: 'M001',
                name: '基础信息',
                level: '一级',
                remark: '',
                isEnabled: '启用',
                hasChildren: true,
                lazyLoaded: true,
                expanded: false,
                children: [
                    {
                        id: 'node-1-1',
                        code: 'M001-01',
                        name: '仓库管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: true,
                        lazyLoaded: true,
                        expanded: false,
                        children: [
                            {
                                id: 'node-1-1-1',
                                code: 'M001-01-01',
                                name: '仓库查询',
                                level: '三级',
                                remark: '',
                                isEnabled: '启用',
                                hasChildren: false,
                                lazyLoaded: true,
                                expanded: false,
                                children: []
                            },
                            {
                                id: 'node-1-1-2',
                                code: 'M001-01-02',
                                name: '仓库新增',
                                level: '三级',
                                remark: '',
                                isEnabled: '启用',
                                hasChildren: false,
                                lazyLoaded: true,
                                expanded: false,
                                children: []
                            }
                        ]
                    },
                    {
                        id: 'node-1-2',
                        code: 'M001-02',
                        name: '商品管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: false,
                        lazyLoaded: true,
                        expanded: false,
                        children: []
                    }
                ]
            },
            {
                id: 'node-2',
                code: 'M002',
                name: '权限管理',
                level: '一级',
                remark: '',
                isEnabled: '启用',
                hasChildren: true,
                lazyLoaded: true,
                expanded: false,
                children: [
                    {
                        id: 'node-2-1',
                        code: 'M002-01',
                        name: '用户管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: false,
                        lazyLoaded: true,
                        expanded: false,
                        children: []
                    }
                ]
            }
        ];

        let moduleTree = null;

        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '系统功能角色',
                statusColumnIndex: 4,
                customSelects: [
                    { inputId: 'searchTenant', dropdownId: 'searchTenantDropdown' }
                ],
                
                fields: [
                    {
                        id: 'tenant',
                        label: '租户',
                        type: 'select',
                        required: true,
                        editDisabled: true,
                        options: []
                    },
                    { id: 'moduleGroupCode', label: '功能角色编码', type: 'text', required: true, editDisabled: true },
                    { id: 'moduleGroupName', label: '功能角色名称', type: 'text', required: true },
                    {
                        type: 'raw',
                        editHtml: `
                            <div class="modal-form-group">
                                <label>功能角色:</label>
                                <div class="input-wrapper">
                                    <input type="text" id="editModuleGroupDisplay" placeholder="功能角色" disabled>
                                </div>
                            </div>
                        `
                    },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true,
                      optionSet: 'enabledStatus'
                    },
                    { id: 'remark', label: '备注', type: 'textarea' },
                    { 
                        type: 'raw', 
                        editHtml: `
                            <div class="modal-divider"></div>
                            <div class="modal-form-group" style="width: 100%;">
                                <label style="width: 80px; font-weight: bold; visibility: hidden;">功能模块</label>
                                <div style="flex: 1; width: 100%;">
                                    <div class="tree-container" id="moduleGroupModuleTree" style="max-height: 300px; min-height: 150px; border: 1px solid #e0e0e0; border-radius: 4px;"></div>
                                </div>
                            </div>
                        ` 
                    }
                ],
                
                addModal: {
                    modalId: 'moduleGroupModal',
                    title: '系统功能角色-详情',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用' },
                    validations: [
                        { id: 'tenant', message: '请选择租户', required: true },
                        { id: 'moduleGroupCode', message: '请输入功能角色编码', required: true },
                        { id: 'moduleGroupName', message: '请输入功能角色名称', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onOpen: () => {
                        const tenantEl = document.getElementById('tenant');
                        const currentTenant = getCurrentTenantDisplay();
                        if (tenantEl && currentTenant) {
                            tenantEl.value = currentTenant;
                            tenantEl.dataset.value = currentTenant;
                        }
                    },
                    onSave: () => {
                        const moduleGroupCode = document.getElementById('moduleGroupCode').value.trim();
                        const moduleGroupName = document.getElementById('moduleGroupName').value.trim();
                        const isEnabled = document.getElementById('isEnabled').value.trim();
                        const remark = document.getElementById('remark').value.trim();

                        if (currentDetailEditRow) {
                            // 编辑模式：更新已有行
                            page.updateTableRow(currentDetailEditRow, {
                                1: moduleGroupCode,
                                2: moduleGroupName,
                                3: remark,
                                4: { value: isEnabled, isStatus: true },
                                5: page.getCurrentTimeStr(),
                                6: '当前用户'
                            });
                            showToast('系统功能角色已更新', 'success');
                            currentDetailEditRow = null;
                        } else {
                            // 新增模式：插入新行
                            const newRow = page.addTableRow({
                                cells: [
                                    // 当前表格暂无租户列，租户仅用于详情表单校验与上下文展示
                                    moduleGroupCode, moduleGroupName, remark,
                                    { value: isEnabled, isStatus: true },
                                    page.getCurrentTimeStr(), '当前用户'
                                ]
                            });
                            if (newRow) {
                                const editBtn = newRow.querySelector('.edit-btn');
                                if (editBtn) {
                                    editBtn.classList.replace('edit-btn', 'detail-edit-btn');
                                }
                                const addRoleBtn = newRow.querySelector('.add-role-btn');
                                if (addRoleBtn) {
                                    addRoleBtn.textContent = '模块授权';
                                    addRoleBtn.classList.add('edit-btn');
                                    addRoleBtn.classList.remove('add-role-btn');
                                }
                            }
                            showToast('系统功能角色已保存', 'success');
                        }
                    }
                },
                
                editModal: {
                    modalId: 'moduleGroupEditModal',
                    title: '模块授权',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        
                        // 获取选中的模块
                        if (moduleTree) {
                            const checkedNodes = moduleTree.getCheckedNodes();
                            console.log('选中的模块:', checkedNodes);
                        }
                        
                        page.updateTableRow(page.currentEditRow, {
                            5: page.getCurrentTimeStr(),
                            6: '当前用户'
                        });
                        showToast('系统功能角色已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        
                        // 延迟初始化树状组件，确保模态框已打开
                        setTimeout(() => {
                            initModuleTree();
                        }, 100);
                        
                        return {
                            editTenant: getCurrentTenantDisplay(),
                            editModuleGroupDisplay: `${cells[1].textContent.trim()}-${cells[2].textContent.trim()}`
                        };
                    }
                },
                
                deleteModal: {}
            });
            
            page.init();

            function getCurrentTenantDisplay() {
                if (typeof getStoredTenant === 'function') {
                    const stored = getStoredTenant();
                    if (stored && stored.code && stored.name) {
                        return `${stored.code}-${stored.name}`;
                    }
                }
                const tenantInput = document.getElementById('tenantSelectInput');
                if (tenantInput && tenantInput.value.trim()) {
                    return tenantInput.value.trim();
                }
                return '';
            }

            const tenantOptions = Array.isArray(window.WMSConfig?.tenants)
                ? window.WMSConfig.tenants
                : [];
            const mockTenantOptions = [
                { code: 'T004', name: '华中租户' },
                { code: 'T005', name: '西南租户' },
                { code: 'T006', name: '东北租户' },
                { code: 'T007', name: '测试租户A' },
                { code: 'T008', name: '测试租户B' }
            ];
            const tenantDisplayOptions = [...tenantOptions, ...mockTenantOptions].map(item => ({
                value: `${item.code}-${item.name}`,
                text: `${item.code}-${item.name}`
            }));

            page.renderDropdownOptions('searchTenantDropdown', tenantDisplayOptions, true);
            page.renderDropdownOptions('tenantDropdown', tenantDisplayOptions, true);
            page.renderDropdownOptions('editTenantDropdown', tenantDisplayOptions, true);

            const currentTenantDisplay = getCurrentTenantDisplay();
            const searchTenantInput = document.getElementById('searchTenant');
            if (searchTenantInput && currentTenantDisplay) {
                searchTenantInput.value = currentTenantDisplay;
                searchTenantInput.dataset.value = currentTenantDisplay;
            }

            const queryBtn = document.querySelector('.search-form .form-actions .btn.btn-primary');
            if (queryBtn) {
                queryBtn.addEventListener('click', (e) => {
                    const tenantKeyword = searchTenantInput?.value.trim();
                    if (tenantKeyword) return;
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    showToast('请选择租户');
                    searchTenantInput?.focus();
                }, true);
            }

            // 模块授权弹窗不展示“是否启用、备注”
            const editIsEnabledGroup = document.getElementById('editIsEnabled')?.closest('.modal-form-group');
            if (editIsEnabledGroup) {
                editIsEnabledGroup.remove();
            }
            const editRemarkGroup = document.getElementById('editRemark')?.closest('.modal-form-group');
            if (editRemarkGroup) {
                editRemarkGroup.remove();
            }
            const editModuleGroupCodeGroup = document.getElementById('editModuleGroupCode')?.closest('.modal-form-group');
            if (editModuleGroupCodeGroup) {
                editModuleGroupCodeGroup.remove();
            }
            const editModuleGroupNameGroup = document.getElementById('editModuleGroupName')?.closest('.modal-form-group');
            if (editModuleGroupNameGroup) {
                editModuleGroupNameGroup.remove();
            }

            // 当前正在编辑详情的行（null 表示新增模式）
            let currentDetailEditRow = null;

            // 打开系统功能角色-详情弹窗（编辑模式）
            function openDetailModal(row) {
                currentDetailEditRow = row;
                const cells = row.querySelectorAll('td');

                // 重置表单，再填数据
                const modal = document.getElementById('moduleGroupModal');
                if (!modal) return;

                const codeEl = document.getElementById('moduleGroupCode');
                const tenantEl = document.getElementById('tenant');
                const nameEl = document.getElementById('moduleGroupName');
                const isEnabledEl = document.getElementById('isEnabled');
                const remarkEl = document.getElementById('remark');

                if (tenantEl) {
                    const currentTenant = getCurrentTenantDisplay();
                    tenantEl.value = currentTenant;
                    tenantEl.dataset.value = currentTenant;
                    tenantEl.disabled = true;
                }
                if (codeEl) {
                    codeEl.disabled = true;
                    codeEl.value = cells[1].textContent.trim();
                }
                if (nameEl) nameEl.value = cells[2].textContent.trim();
                if (isEnabledEl) {
                    const statusText = cells[4].querySelector('.status')?.textContent.trim() || '';
                    isEnabledEl.value = statusText;
                    isEnabledEl.dataset.value = statusText;
                }
                if (remarkEl) remarkEl.value = cells[3].textContent.trim();

                modal.style.display = 'block';
            }

            // 关闭详情弹窗时的清理：重置 currentDetailEditRow，解除 moduleGroupCode 禁用
            function onDetailModalClose() {
                currentDetailEditRow = null;
                const codeEl = document.getElementById('moduleGroupCode');
                const tenantEl = document.getElementById('tenant');
                if (codeEl) codeEl.disabled = false;
                if (tenantEl) tenantEl.disabled = false;
            }

            // 监听详情编辑按钮（事件委托）
            const tableBody = document.getElementById('tableBody');
            if (tableBody) {
                tableBody.addEventListener('click', (e) => {
                    const detailBtn = e.target.closest('.detail-edit-btn');
                    if (!detailBtn) return;
                    e.preventDefault();
                    openDetailModal(detailBtn.closest('tr'));
                });
            }

            // 新增时确保编码字段可编辑
            document.getElementById('addBtn').addEventListener('click', () => {
                currentDetailEditRow = null;
                const codeEl = document.getElementById('moduleGroupCode');
                const tenantEl = document.getElementById('tenant');
                if (codeEl) codeEl.disabled = false;
                if (tenantEl) {
                    tenantEl.disabled = false;
                    const currentTenant = getCurrentTenantDisplay();
                    tenantEl.value = currentTenant;
                    tenantEl.dataset.value = currentTenant;
                }
            });
            
            // 详情弹窗关闭/取消/遮罩 → 清理编辑状态
            const addModal = document.getElementById('moduleGroupModal');
            if (addModal) {
                addModal.addEventListener('click', (e) => {
                    if (e.target === addModal) onDetailModalClose();
                });
            }
            const addCancelBtn = document.getElementById('cancelBtn');
            if (addCancelBtn) {
                addCancelBtn.addEventListener('click', () => onDetailModalClose());
            }
            const addCloseBtn = document.querySelector('#moduleGroupModal .close');
            if (addCloseBtn) {
                addCloseBtn.addEventListener('click', () => onDetailModalClose());
            }

            // 关闭模块授权模态框按钮
            const editCloseBtn = document.querySelector('#moduleGroupEditModal .close');
            if (editCloseBtn) {
                editCloseBtn.addEventListener('click', () => page.closeModal('edit'));
            }

            // 监听编辑模态框关闭事件，销毁树状组件
            const editModal = document.getElementById('moduleGroupEditModal');
            if (editModal) {
                editModal.addEventListener('click', (e) => {
                    if (e.target === editModal) {
                        destroyModuleTree();
                    }
                });
            }

            // 编辑取消按钮
            const editCancelBtn = document.getElementById('editCancelBtn');
            if (editCancelBtn) {
                editCancelBtn.addEventListener('click', () => {
                    destroyModuleTree();
                });
            }
        });

        // 初始化树状组件
        function initModuleTree() {
            destroyModuleTree();
            
            const container = document.getElementById('moduleGroupModuleTree');
            if (!container) return;
            
            moduleTree = new TreeComponent({
                container: container,
                columns: [
                    { key: 'name', label: '名称' }
                ],
                showCheckboxes: true,
                showActions: false,
                showHeader: false,
                onCheckChange: (checkedNodes) => {
                    console.log('选中的模块变化:', checkedNodes);
                }
            });
            
            moduleTree.expandedNodes.clear();
            moduleTree.saveState = function() {};
            moduleTree.setData(moduleData);
            moduleTree.expandAll();
        }

        // 销毁树状组件
        function destroyModuleTree() {
            if (moduleTree) {
                moduleTree.destroy();
                moduleTree = null;
            }
        }

    </script>
</body>
</html>
