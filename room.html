<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 仓间管理</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- 侧边栏容器 -->
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>

    <!-- 顶部导航栏容器 -->
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">仓间</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">基础信息 / 仓间</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group">
                        <label>仓间编码:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>仓间名称:</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>仓间类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchRoomType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchRoomTypeDropdown">
                                <div class="select-option" data-value="normal">普通仓间</div>
                                <div class="select-option" data-value="processing">加工仓间</div>
                                <div class="select-option" data-value="cold">冷藏仓间</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="yes">启用</div>
                                <div class="select-option" data-value="no">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>仓间编码</th>
                                <th>仓间名称</th>
                                <th>仓间类型</th>
                                <th>仓库</th>
                                <th>地址</th>
                                <th>联系人</th>
                                <th>电话</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>R001</td>
                                <td>南京仓-综合仓间</td>
                                <td>普通仓间</td>
                                <td>W001-南京仓</td>
                                <td>南京市江宁区科学园</td>
                                <td>张三</td>
                                <td>13800138000</td>
                                <td><span class="status active">启用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>R002</td>
                                <td>南京仓-加工仓间</td>
                                <td>加工仓间</td>
                                <td>W001-南京仓</td>
                                <td>南京市江宁区经济开发区</td>
                                <td>王五</td>
                                <td>13900139000</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2025-01-05 12:31:43</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 引入公共脚本 -->
    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script>
        // 使用PageManager简化页面逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const ROOM_TYPE_TEXT_MAP = {
                normal: '普通仓间',
                processing: '加工仓间',
                cold: '冷藏仓间'
            };

            const getRoomTypeText = (value) => {
                if (!value) return ROOM_TYPE_TEXT_MAP.normal;
                if (ROOM_TYPE_TEXT_MAP[value]) return ROOM_TYPE_TEXT_MAP[value];
                if (Object.values(ROOM_TYPE_TEXT_MAP).includes(value)) return value;
                return ROOM_TYPE_TEXT_MAP.normal;
            };

            const getRoomTypeValue = (textOrValue) => {
                if (!textOrValue) return 'normal';
                if (ROOM_TYPE_TEXT_MAP[textOrValue]) return textOrValue;
                const matched = Object.entries(ROOM_TYPE_TEXT_MAP).find(([, text]) => text === textOrValue);
                return matched ? matched[0] : 'normal';
            };

            const page = new PageManager({
                entityName: '仓间',
                statusColumnIndex: 8,
                
                // 搜索区域下拉框
                customSelects: [
                    { inputId: 'searchRoomType', dropdownId: 'searchRoomTypeDropdown' },
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                
                // 字段定义 - 自动生成新增/编辑模态框
                fields: [
                    { id: 'tenant', label: '租户', type: 'select', required: true, disabled: true, editDisabled: true,
                      options: [{ value: 'XX集团', text: 'XX集团' }, { value: '测试租户', text: '测试租户' }] },
                    { id: 'warehouse', label: '仓库', type: 'select', required: true, disabled: true,
                      options: [
                          { value: 'W001', text: 'W001-南京仓' },
                          { value: 'W002', text: 'W002-嘉兴仓' },
                          { value: 'W003', text: 'W003-上海仓' },
                          { value: 'W004', text: 'W004-北京仓' },
                          { value: 'W005', text: 'W005-广州仓' }
                      ] },
                    { id: 'roomCode', label: '仓间编码', type: 'text', required: true, editDisabled: true },
                    { id: 'roomName', label: '仓间名称', type: 'text', required: true, editDisabled: true },
                    { id: 'roomType', label: '仓间类型', type: 'select', required: true,
                      options: [{ value: 'normal', text: '普通仓间' }, { value: 'processing', text: '加工仓间' }, { value: 'cold', text: '冷藏仓间' }] },
                    { id: 'address', label: '地址', type: 'text' },
                    { id: 'contact', label: '联系人', type: 'text' },
                    { id: 'phone', label: '电话', type: 'text' },
                    { id: 'isEnabled', label: '是否启用', type: 'select', required: true,
                      optionSet: 'isEnabled' },
                    { id: 'remark', label: '备注', type: 'textarea' }
                ],
                
                addModal: {
                    modalId: 'roomModal',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用', tenant: 'XX集团' },
                    validations: [
                        { id: 'tenant', message: '请选择租户', required: true },
                        { id: 'warehouse', message: '请选择仓库', required: true },
                        { id: 'roomCode', message: '请输入仓间编码', required: true },
                        { id: 'roomName', message: '请输入仓间名称', required: true },
                        { id: 'roomType', message: '请选择仓间类型', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const tenant = document.getElementById('tenant').value.trim();
                        const code = document.getElementById('roomCode').value.trim();
                        const name = document.getElementById('roomName').value.trim();
                        const roomTypeInput = document.getElementById('roomType');
                        const roomType = roomTypeInput.dataset.value || roomTypeInput.value.trim();
                        const warehouse = document.getElementById('warehouse').value.trim();
                        const enabled = document.getElementById('isEnabled').value.trim();
                        const address = document.getElementById('address')?.value.trim() || '-';
                        const contact = document.getElementById('contact')?.value.trim() || '-';
                        const phone = document.getElementById('phone')?.value.trim() || '-';
                        
                        const roomTypeText = getRoomTypeText(roomType);
                        
                        page.addTableRow({
                            cells: [
                                code,
                                name,
                                roomTypeText,
                                warehouse,
                                address,
                                contact,
                                phone,
                                { value: enabled, isStatus: true },
                                page.getCurrentTimeStr(),
                                '当前用户'
                            ]
                        });
                        showToast('仓间信息已保存', 'success');
                    }
                },
                
                editModal: {
                    modalId: 'roomEditModal',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [
                        { id: 'editTenant', message: '请选择租户', required: true },
                        { id: 'editRoomType', message: '请选择仓间类型', required: true },
                        { id: 'editRoomName', message: '请输入仓间名称', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        
                        const editRoomTypeInput = document.getElementById('editRoomType');
                        const roomType = editRoomTypeInput.dataset.value || editRoomTypeInput.value.trim();
                        const roomTypeText = getRoomTypeText(roomType);
                        
                        page.updateTableRow(page.currentEditRow, {
                            3: roomTypeText,
                            5: document.getElementById('editAddress')?.value.trim() || '-',
                            6: document.getElementById('editContact')?.value.trim() || '-',
                            7: document.getElementById('editPhone')?.value.trim() || '-',
                            8: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            9: page.getCurrentTimeStr(),
                            10: '当前用户'
                        });
                        showToast('仓间信息已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        
                        const roomTypeText = cells[3].textContent;
                        
                        return {
                            editTenant: 'XX集团',
                            editRoomCode: cells[1].textContent,
                            editRoomName: cells[2].textContent,
                            editRoomType: getRoomTypeText(getRoomTypeValue(roomTypeText)),
                            editWarehouse: cells[4].textContent,
                            editIsEnabled: cells[8].querySelector('.status').textContent,
                            editAddress: cells[5].textContent === '-' ? '' : cells[5].textContent,
                            editContact: cells[6].textContent === '-' ? '' : cells[6].textContent,
                            editPhone: cells[7].textContent === '-' ? '' : cells[7].textContent
                        };
                    }
                },
                
                deleteModal: {
                    modalId: 'confirmDeleteModal',
                    closeBtnId: 'confirmDeleteCloseBtn',
                    cancelBtnId: 'cancelDeleteBtn',
                    confirmBtnId: 'confirmDeleteBtn'
                }
            });
            
            page.init();
            
            // 新增时设置当前仓库
            document.getElementById('addBtn').addEventListener('click', () => {
                const currentWarehouse = getCurrentWarehouse();
                if (currentWarehouse) {
                    const warehouseInput = document.getElementById('warehouse');
                    warehouseInput.value = `${currentWarehouse.code}-${currentWarehouse.name}`;
                    warehouseInput.dataset.value = currentWarehouse.code;
                }
            });
        });
    </script>
</body>
</html>
