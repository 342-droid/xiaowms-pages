<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 登录</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body {
            background: linear-gradient(135deg, #003d80 0%, #005fcc 55%, #004c99 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 400px;
            overflow: hidden;
        }

        .login-header {
            background: #005fcc;
            padding: 30px;
            text-align: center;
            color: white;
        }

        .login-header img {
            height: 50px;
            margin-bottom: 10px;
        }

        .login-header h1 {
            font-size: 24px;
            margin: 0;
            font-weight: normal;
        }

        .login-header p {
            margin: 5px 0 0;
            opacity: 0.8;
            font-size: 14px;
        }

        .login-form {
            padding: 30px;
        }

        .login-form-group {
            margin-bottom: 20px;
        }

        .login-form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .login-form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .login-form-group input:focus {
            outline: none;
            border-color: #005fcc;
            box-shadow: 0 0 0 3px rgba(0, 95, 204, 0.15);
        }

        .login-form-group input::placeholder {
            color: #999;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #666;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #005fcc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background: #004c99;
        }

        .login-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        /* Toast提示样式 - 与系统保持一致 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        .toast.error {
            background-color: #f44336;
        }

        .toast.success {
            background-color: #4CAF50;
        }

        .login-footer {
            text-align: center;
            padding: 20px 30px 30px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="WMS.svg" alt="WMS">
            <h1>WMS</h1>
            <p>仓储管理系统</p>
        </div>
        
        <form class="login-form" id="loginForm">
            
            <div class="login-form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名">
            </div>
            
            <div class="login-form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码">
            </div>
            
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>记住我</span>
                </label>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        </form>
        
        <div class="login-footer">
            © 2026 物流 版权所有
        </div>
    </div>
    
    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script src="js/auth-pages.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AuthPage.initLoginPage({
                redirectUrl: 'index.html'
            });
        });
    </script>
</body>
</html>
