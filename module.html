<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 系统模块</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="js/sidebar.js"></script>
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">系统模块</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">权限管理 / 系统模块</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <div class="tree-container" id="moduleTree" role="tree" aria-label="系统功能模块树"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="moduleModal" class="modal">
        <div class="modal-content" style="width: 60%;">
            <div class="modal-header">
                <h2 class="modal-title" id="moduleModalTitle">系统模块-详情</h2>
                <span class="close" id="moduleModalCloseBtn">&times;</span>
            </div>
            <form class="modal-form">
                <div class="modal-form-group">
                    <label>租户<span style="color: red;">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="tenant" placeholder="请输入" disabled>
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group">
                    <label>模块编码<span style="color: red;">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="moduleCode" placeholder="请输入">
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group">
                    <label>模块名称<span style="color: red;">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="moduleName" placeholder="请输入">
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group">
                    <label>父模块</label>
                    <div class="input-wrapper">
                        <input type="text" id="parentModuleCode" placeholder="请输入" disabled>
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group custom-select-wrapper">
                    <label>模块类型<span style="color: red;">*</span></label>
                    <div class="custom-select">
                        <input type="text" id="moduleType" placeholder="请选择">
                        <span class="select-arrow">▼</span>
                        <span class="clear-btn">×</span>
                        <div class="select-dropdown" id="moduleTypeDropdown">
                            <div class="select-option" data-value="menu">菜单</div>
                            <div class="select-option" data-value="button">按钮</div>
                            <div class="select-option" data-value="tab">TAB栏</div>
                        </div>
                    </div>
                </div>
                <div class="modal-form-group">
                    <label>排序</label>
                    <div class="input-wrapper">
                        <input type="text" id="sortOrder" placeholder="请输入">
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group">
                    <label>URL</label>
                    <div class="input-wrapper">
                        <input type="text" id="moduleUrl" placeholder="请输入">
                        <span class="clear-btn">×</span>
                    </div>
                </div>
                <div class="modal-form-group" style="width: 100%;">
                    <label style="width: 80px;">备注</label>
                    <textarea id="remark" placeholder="请输入" rows="4" style="flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 3px; outline: none; resize: vertical;"></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="moduleSaveBtn">保存</button>
                <button type="button" class="btn btn-secondary" id="moduleCancelBtn">取消</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/form-utils.js"></script>
    <script src="js/modal-manager.js"></script>
    <script src="js/page-manager.js"></script>
    <script src="js/tree-component.js"></script>
    <script src="js/tree-data-service.js"></script>
    <script>
        const moduleData = [
            {
                id: 'node-1',
                code: 'M001',
                name: '基础信息',
                level: '一级',
                remark: '',
                isEnabled: '启用',
                hasChildren: true,
                lazyLoaded: false,
                expanded: false,
                children: [
                    {
                        id: 'node-1-1',
                        code: 'M001-01',
                        name: '仓库管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: true,
                        lazyLoaded: false,
                        expanded: false,
                        children: [
                            {
                                id: 'node-1-1-1',
                                code: 'M001-01-01',
                                name: '仓库查询',
                                level: '三级',
                                remark: '',
                                isEnabled: '启用',
                                hasChildren: false,
                                lazyLoaded: false,
                                expanded: false,
                                children: []
                            },
                            {
                                id: 'node-1-1-2',
                                code: 'M001-01-02',
                                name: '仓库新增',
                                level: '三级',
                                remark: '',
                                isEnabled: '启用',
                                hasChildren: false,
                                lazyLoaded: false,
                                expanded: false,
                                children: []
                            }
                        ]
                    },
                    {
                        id: 'node-1-2',
                        code: 'M001-02',
                        name: '商品管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: false,
                        lazyLoaded: false,
                        expanded: false,
                        children: []
                    }
                ]
            },
            {
                id: 'node-2',
                code: 'M002',
                name: '权限管理',
                level: '一级',
                remark: '',
                isEnabled: '启用',
                hasChildren: true,
                lazyLoaded: false,
                expanded: false,
                children: [
                    {
                        id: 'node-2-1',
                        code: 'M002-01',
                        name: '用户管理',
                        level: '二级',
                        remark: '',
                        isEnabled: '启用',
                        hasChildren: false,
                        lazyLoaded: false,
                        expanded: false,
                        children: []
                    }
                ]
            }
        ];

        let moduleTree = null;
        let moduleModalController = null;
        let treeDataService = null;
        let currentParentNode = null;
        let currentEditNode = null;
        let isEditMode = false;

        function openModuleModal(isEdit, nodeId = null) {
            isEditMode = isEdit;
            document.getElementById('moduleModalTitle').textContent = '系统模块-详情';
            document.getElementById('tenant').value = 'XX集团';
            
            if (isEdit && nodeId) {
                currentEditNode = treeDataService.findNodeById(nodeId);
                if (currentEditNode) {
                    const parent = treeDataService.findParentNode(nodeId);
                    document.getElementById('moduleCode').value = currentEditNode.code || '';
                    document.getElementById('moduleName').value = currentEditNode.name || '';
                    document.getElementById('parentModuleCode').value = parent ? parent.code : '';
                    document.getElementById('moduleType').value = currentEditNode.moduleType || '';
                    document.getElementById('sortOrder').value = currentEditNode.sortOrder || '';
                    document.getElementById('moduleUrl').value = currentEditNode.moduleUrl || '';
                    document.getElementById('remark').value = currentEditNode.remark || '';
                    document.getElementById('moduleCode').disabled = true;
                    document.getElementById('parentModuleCode').disabled = true;
                }
            } else {
                currentEditNode = null;
                document.getElementById('moduleCode').value = '';
                document.getElementById('moduleName').value = '';
                document.getElementById('parentModuleCode').value = currentParentNode ? currentParentNode.code : '';
                document.getElementById('moduleType').value = '';
                document.getElementById('sortOrder').value = '';
                document.getElementById('moduleUrl').value = '';
                document.getElementById('remark').value = '';
                document.getElementById('moduleCode').disabled = false;
                document.getElementById('parentModuleCode').disabled = currentParentNode ? true : false;
            }
            
            moduleModalController.open();
        }

        function closeModuleModal() {
            moduleModalController.close();
            currentParentNode = null;
            currentEditNode = null;
        }

        function saveModule() {
            const tenant = document.getElementById('tenant').value.trim();
            const code = document.getElementById('moduleCode').value.trim();
            const name = document.getElementById('moduleName').value.trim();
            const parentCodeInput = document.getElementById('parentModuleCode').value.trim();
            const moduleType = document.getElementById('moduleType').value.trim();
            const sortOrder = document.getElementById('sortOrder').value.trim();
            const moduleUrl = document.getElementById('moduleUrl').value.trim();
            const remark = document.getElementById('remark').value.trim();

            if (!tenant) {
                showToast('租户不能为空', 'error');
                return;
            }
            if (!code) {
                showToast('请输入功能模块编码', 'error');
                return;
            }
            if (!name) {
                showToast('请输入功能模块名称', 'error');
                return;
            }
            if (!moduleType) {
                showToast('请选择模块类型', 'error');
                return;
            }
            if (isEditMode && currentEditNode) {
                currentEditNode.code = code;
                currentEditNode.name = name;
                currentEditNode.moduleType = moduleType;
                currentEditNode.sortOrder = sortOrder;
                currentEditNode.moduleUrl = moduleUrl;
                currentEditNode.remark = remark;
                showToast('系统功能模块已更新', 'success');
            } else {
                let level = '一级';
                let targetParent = currentParentNode;

                if (!targetParent && parentCodeInput) {
                    targetParent = treeDataService.findNodeByCode(parentCodeInput);
                    if (!targetParent) {
                        showToast('父模块编码不存在', 'error');
                        return;
                    }
                }

                if (targetParent) {
                    const levelMap = { '一级': '二级', '二级': '三级' };
                    level = levelMap[targetParent.level] || '一级';
                }

                if (level === '一级' && !currentParentNode && parentCodeInput && !targetParent) {
                    showToast('父模块编码无效', 'error');
                    return;
                }

                const newNode = {
                    id: 'node-' + Date.now(),
                    code: code,
                    name: name,
                    level: level,
                    moduleType: moduleType,
                    sortOrder: sortOrder,
                    moduleUrl: moduleUrl,
                    remark: remark,
                    hasChildren: false,
                    lazyLoaded: true,
                    expanded: false,
                    children: []
                };

                if (targetParent) {
                    if (!targetParent.children) {
                        targetParent.children = [];
                    }
                    targetParent.children.push(newNode);
                    targetParent.hasChildren = true;
                    if (moduleTree) {
                        moduleTree.expandNode(targetParent.id);
                    }
                } else {
                    moduleData.push(newNode);
                }

                showToast('系统功能模块已保存', 'success');
            }

            if (moduleTree) {
                moduleTree.setData(moduleData);
            }

            closeModuleModal();
        }

        function deleteModule(nodeId) {
            const nodeToDelete = treeDataService.findNodeById(nodeId);
            if (!nodeToDelete) return;

            if (nodeToDelete.hasChildren && nodeToDelete.children && nodeToDelete.children.length > 0) {
                showToast('节点下存在数据，不允许删除', 'error');
                return;
            }

            treeDataService.removeLeafNode(nodeId);

            if (moduleTree) {
                moduleTree.setData(moduleData);
            }

            showToast('系统功能模块已删除', 'success');
        }

        document.addEventListener('DOMContentLoaded', () => {
            treeDataService = new TreeDataService(moduleData);
            moduleModalController = window.WMSUI.createModalController({
                modalId: 'moduleModal',
                closeButtonIds: ['moduleModalCloseBtn', 'moduleCancelBtn']
            });

            moduleTree = new TreeComponent({
                container: document.getElementById('moduleTree'),
                columns: [
                    { key: 'name', label: '名称' }
                ],
                onAdd: (nodeId) => {
                    currentParentNode = treeDataService.findNodeById(nodeId);
                    openModuleModal(false);
                },
                onEdit: (nodeId) => {
                    currentParentNode = null;
                    openModuleModal(true, nodeId);
                },
                onDelete: (nodeId) => {
                    deleteModule(nodeId);
                }
            });
            moduleTree.expandedNodes.clear();
            moduleTree.saveState = function() {};
            moduleTree.setData(moduleData);

            document.getElementById('addBtn').addEventListener('click', () => {
                currentParentNode = null;
                openModuleModal(false);
            });

            document.getElementById('moduleSaveBtn').addEventListener('click', saveModule);
            initCustomSelect('moduleType', 'moduleTypeDropdown');

        });
    </script>
</body>
</html>
